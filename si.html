<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ إعدادات صفحة قريباً - مركز يثرب الخيري التخصصي</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0a1a2f 0%, #1a3a5a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid #0e7c9e;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #63b3ed, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header h2 {
            color: #94a3b8;
            font-size: 1.3em;
            font-weight: 300;
        }

        .settings-card {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(14, 124, 158, 0.3);
        }

        .card-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            color: #0e7c9e;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(14, 124, 158, 0.3);
            padding-bottom: 15px;
        }

        .card-title i {
            font-size: 1.3em;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-label i {
            color: #0e7c9e;
            margin-left: 5px;
        }

        .form-control {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1em;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: #0e7c9e;
            background: rgba(255, 255, 255, 0.1);
        }

        .form-control::placeholder {
            color: #4a5568;
        }

        textarea.form-control {
            min-height: 80px;
            resize: vertical;
        }

        .service-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(14, 124, 158, 0.3);
            position: relative;
        }

        .service-item:hover {
            border-color: #0e7c9e;
        }

        .remove-service {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 30px;
            height: 30px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 1em;
            border: 2px solid white;
        }

        .remove-service:hover {
            background: #dc2626;
        }

        .icon-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
        }

        .icon-option {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .icon-option:hover,
        .icon-option.selected {
            background: #0e7c9e;
            color: white;
            transform: scale(1.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cairo', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 124, 158, 0.3);
        }

        .btn-success {
            background: linear-gradient(145deg, #10b981, #059669);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(145deg, #f59e0b, #d97706);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: white;
        }

        .actions-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .preview-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 2px dashed #0e7c9e;
        }

        .preview-title {
            color: #0e7c9e;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .connection-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(14, 124, 158, 0.3);
            z-index: 1000;
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .led-green {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .led-red {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚙️ إعدادات صفحة قريباً</h1>
            <h2>مركز يثرب الخيري التخصصي</h2>
        </div>

        <!-- Connection Status -->
        <div class="connection-status" id="connectionStatus">
            <div class="status-led" id="connectionLed"></div>
            <span id="connectionText">جاري الاتصال...</span>
        </div>

        <!-- Main Settings Form -->
        <form id="settingsForm" onsubmit="event.preventDefault(); saveSettings();">
            <!-- Basic Info Card -->
            <div class="settings-card">
                <div class="card-title">
                    <i class="fas fa-info-circle"></i> المعلومات الأساسية
                </div>
                <div class="grid-2">
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-building"></i> اسم المركز
                        </label>
                        <input type="text" class="form-control" id="centerName" 
                               placeholder="مثال: مركز يثرب الخيري التخصصي">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone"></i> رقم التليفون
                        </label>
                        <input type="text" class="form-control" id="phone" 
                               placeholder="مثال: ١٥٠٠٠">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fab fa-facebook"></i> رابط فيسبوك
                        </label>
                        <input type="url" class="form-control" id="facebook" 
                               placeholder="https://facebook.com/...">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-map-marker-alt"></i> العنوان
                        </label>
                        <input type="text" class="form-control" id="address" 
                               placeholder="مثال: المدينة المنورة - المملكة العربية السعودية">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-image"></i> رابط اللوجو
                        </label>
                        <input type="url" class="form-control" id="logoUrl" 
                               placeholder="https://example.com/logo.jpg">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-calendar"></i> تاريخ الافتتاح
                        </label>
                        <input type="date" class="form-control" id="completionDate">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-clock"></i> وقت التسليم
                        </label>
                        <input type="time" class="form-control" id="deliveryTime">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-comment"></i> الكومنت (يظهر تحت الكاونتر)
                        </label>
                        <textarea class="form-control" id="comment" 
                                  placeholder="مثال: استعدوا معنا لأكبر افتتاح طبي في المدينة المنورة"></textarea>
                    </div>
                </div>
            </div>

            <!-- Services Card -->
            <div class="settings-card">
                <div class="card-title">
                    <i class="fas fa-cubes"></i> الخدمات (تظهر في الصفحة الرئيسية)
                </div>
                
                <div id="servicesContainer">
                    <!-- Services will be added here -->
                </div>

                <button type="button" class="btn btn-success" onclick="addService()">
                    <i class="fas fa-plus"></i> إضافة خدمة جديدة
                </button>
            </div>

            <!-- Actions -->
            <div class="actions-bar">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> حفظ كل الإعدادات
                </button>
                <button type="button" class="btn btn-warning" onclick="loadSettings()">
                    <i class="fas fa-sync-alt"></i> تحميل من Firebase
                </button>
                <button type="button" class="btn btn-danger" onclick="resetForm()">
                    <i class="fas fa-undo"></i> استعادة الافتراضي
                </button>
            </div>
        </form>

        <!-- Preview Card -->
        <div class="settings-card">
            <div class="card-title">
                <i class="fas fa-eye"></i> معاينة سريعة
            </div>
            <div class="preview-box" id="previewBox">
                <div class="preview-title">
                    <i class="fas fa-building"></i>
                    <span id="previewCenterName">...</span>
                </div>
                <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px;">
                    <div><i class="fas fa-phone" style="color: #0e7c9e;"></i> <span id="previewPhone">...</span></div>
                    <div><i class="fas fa-map-marker-alt" style="color: #0e7c9e;"></i> <span id="previewAddress">...</span></div>
                    <div><i class="fas fa-calendar" style="color: #0e7c9e;"></i> <span id="previewDate">...</span></div>
                </div>
                <div style="margin-top: 15px; color: #fbbf24;" id="previewComment">...</div>
                <div style="margin-top: 20px;">
                    <strong>الخدمات:</strong>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;" id="previewServices"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909",
            storageBucket: "yathreb-10909.firebasestorage.app",
            messagingSenderId: "525635197745",
            appId: "1:525635197745:web:99e1cbab31693af790ae10"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // متغيرات
        let services = [];

        // أيقونات متاحة
        const availableIcons = [
            'fa-stethoscope', 'fa-flask', 'fa-baby', 'fa-user-nurse', 'fa-heartbeat', 
            'fa-hand-holding-heart', 'fa-tooth', 'fa-eye', 'fa-lungs', 'fa-brain',
            'fa-bone', 'fa-syringe', 'fa-pills', 'fa-microscope', 'fa-x-ray',
            'fa-truck-medical', 'fa-house-chimney-medical', 'fa-user-doctor'
        ];

        // تحميل الإعدادات
        async function loadSettings() {
            try {
                const doc = await db.collection('settings').doc('comingSoon').get();
                
                if (doc.exists) {
                    const data = doc.data();
                    
                    // تعبئة الحقول
                    document.getElementById('centerName').value = data.centerName || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('facebook').value = data.facebook || '';
                    document.getElementById('address').value = data.address || '';
                    document.getElementById('logoUrl').value = data.logoUrl || '';
                    document.getElementById('completionDate').value = data.completionDate || '';
                    document.getElementById('deliveryTime').value = data.deliveryTime || '';
                    document.getElementById('comment').value = data.comment || '';
                    
                    services = data.services || [];
                    renderServices();
                    updatePreview();
                    
                    updateConnectionStatus(true, 'تم تحميل الإعدادات');
                } else {
                    // بيانات افتراضية
                    setDefaultData();
                }
            } catch (error) {
                console.error('Error loading settings:', error);
                updateConnectionStatus(false, 'خطأ في التحميل');
            }
        }

        // بيانات افتراضية
        function setDefaultData() {
            document.getElementById('centerName').value = 'مركز يثرب الخيري التخصصي';
            document.getElementById('phone').value = '١٥٠٠٠';
            document.getElementById('facebook').value = 'https://www.facebook.com/ythrb.altkhssy';
            document.getElementById('address').value = 'المدينة المنورة - المملكة العربية السعودية';
            document.getElementById('logoUrl').value = 'https://scontent.faly2-2.fna.fbcdn.net/v/t39.30808-6/476472762_1187938009650859_5208399285481594262_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=Jj3_P2SMrOIQ7kNvwE07p-l&_nc_oc=AdlxfEKMUf4mnTe1QvbSWdKzzFzkHX9DrlfuxIBwrVbOtowui5H3X5kZGIM6f9dB_Gc&_nc_zt=23&_nc_ht=scontent.faly2-2.fna&_nc_gid=MkEyGIJBMhR04y8s7i9okw&_nc_ss=8&oh=00_AfzbUeCF4Nf5C4B9CIFr5C0w66qD471ZiPQ-X3O90N2NEA&oe=69BDEAF7';
            document.getElementById('completionDate').value = '2026-01-01';
            document.getElementById('deliveryTime').value = '12:00';
            document.getElementById('comment').value = 'استعدوا معنا لأكبر افتتاح طبي في المدينة المنورة';
            
            services = [
                { icon: 'fa-user-md', name: 'عيادات تخصصية', comment: 'باطنة - مسالك - أطفال' },
                { icon: 'fa-flask', name: 'معمل متطور', comment: 'تحاليل دقيقة وسريعة' },
                { icon: 'fa-baby', name: 'حضانات أطفال', comment: 'رعاية متكاملة' },
                { icon: 'fa-user-nurse', name: 'تمريض منزلي', comment: 'رعاية تمريضية في المنزل' },
                { icon: 'fa-heartbeat', name: 'أشعة وتشخيص', comment: 'سونار - رسم قلب' },
                { icon: 'fa-hand-holding-heart', name: 'خدمات خيرية', comment: 'بأسعار مخفضة' }
            ];
            
            renderServices();
            updatePreview();
        }

        // حفظ الإعدادات
        async function saveSettings() {
            // جمع البيانات
            const settings = {
                centerName: document.getElementById('centerName').value,
                phone: document.getElementById('phone').value,
                facebook: document.getElementById('facebook').value,
                address: document.getElementById('address').value,
                logoUrl: document.getElementById('logoUrl').value,
                completionDate: document.getElementById('completionDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                comment: document.getElementById('comment').value,
                services: services,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('settings').doc('comingSoon').set(settings, { merge: true });
                updateConnectionStatus(true, 'تم الحفظ بنجاح');
                updatePreview();
                
                // تأثير نجاح
                const btn = document.querySelector('.btn-primary');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
                
            } catch (error) {
                console.error('Error saving:', error);
                updateConnectionStatus(false, 'خطأ في الحفظ');
            }
        }

        // إضافة خدمة جديدة
        function addService() {
            services.push({
                icon: 'fa-stethoscope',
                name: 'خدمة جديدة',
                comment: 'وصف الخدمة'
            });
            renderServices();
        }

        // حذف خدمة
        function removeService(index) {
            services.splice(index, 1);
            renderServices();
        }

        // تحديث خدمة
        function updateService(index, field, value) {
            services[index][field] = value;
            updatePreview();
        }

        // تحديث أيقونة
        function updateServiceIcon(index, icon) {
            services[index].icon = icon;
            renderServices(); // إعادة الرندر عشان تحديث الأيقونات المختارة
            updatePreview();
        }

        // عرض الخدمات
        function renderServices() {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';

            services.forEach((service, index) => {
                const serviceDiv = document.createElement('div');
                serviceDiv.className = 'service-item';
                
                // أيقونات HTML
                let iconsHtml = '';
                availableIcons.forEach(icon => {
                    iconsHtml += `
                        <div class="icon-option ${service.icon === icon ? 'selected' : ''}" 
                             onclick="updateServiceIcon(${index}, '${icon}')">
                            <i class="fas ${icon}"></i>
                        </div>
                    `;
                });

                serviceDiv.innerHTML = `
                    <div class="remove-service" onclick="removeService(${index})">
                        <i class="fas fa-times"></i>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-tag"></i> اسم الخدمة</label>
                            <input type="text" class="form-control" 
                                   value="${service.name}"
                                   onchange="updateService(${index}, 'name', this.value)">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-info-circle"></i> وصف الخدمة</label>
                            <input type="text" class="form-control" 
                                   value="${service.comment}"
                                   onchange="updateService(${index}, 'comment', this.value)">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-icons"></i> اختر الأيقونة</label>
                        <div class="icon-selector">
                            ${iconsHtml}
                        </div>
                    </div>
                `;
                
                container.appendChild(serviceDiv);
            });
        }

        // تحديث المعاينة
        function updatePreview() {
            document.getElementById('previewCenterName').textContent = 
                document.getElementById('centerName').value || 'مركز يثرب الخيري التخصصي';
            
            document.getElementById('previewPhone').textContent = 
                document.getElementById('phone').value || '١٥٠٠٠';
            
            document.getElementById('previewAddress').textContent = 
                document.getElementById('address').value || 'المدينة المنورة';
            
            document.getElementById('previewDate').textContent = 
                document.getElementById('completionDate').value || '2026-01-01';
            
            document.getElementById('previewComment').textContent = 
                document.getElementById('comment').value || 'استعدوا معنا لأكبر افتتاح طبي';
            
            // عرض الخدمات في المعاينة
            const previewServices = document.getElementById('previewServices');
            previewServices.innerHTML = '';
            
            services.forEach(service => {
                const badge = document.createElement('span');
                badge.style.cssText = 'background: rgba(14,124,158,0.2); padding: 8px 15px; border-radius: 30px; font-size: 0.9em;';
                badge.innerHTML = `<i class="fas ${service.icon}" style="color: #0e7c9e; margin-left: 5px;"></i> ${service.name}`;
                previewServices.appendChild(badge);
            });
        }

        // تحديث حالة الاتصال
        function updateConnectionStatus(connected, message) {
            const led = document.getElementById('connectionLed');
            const text = document.getElementById('connectionText');
            
            if (connected) {
                led.className = 'status-led led-green';
                text.textContent = message || 'متصل';
            } else {
                led.className = 'status-led led-red';
                text.textContent = message || 'غير متصل';
            }
        }

        // استعادة النموذج
        function resetForm() {
            if (confirm('هل أنت متأكد من استعادة الإعدادات الافتراضية؟')) {
                setDefaultData();
            }
        }

        // ربط التغييرات بالمعاينة
        document.querySelectorAll('input, textarea, select').forEach(element => {
            element.addEventListener('input', updatePreview);
        });

        // تحميل الإعدادات عند بدء التشغيل
        window.onload = function() {
            loadSettings();
            
            // التحقق من اتصال Firebase
            db.collection('test').doc('connection').set({
                timestamp: new Date().toISOString()
            }).then(() => {
                updateConnectionStatus(true, 'متصل');
            }).catch(error => {
                updateConnectionStatus(false, 'غير متصل');
            });
        };
    </script>
</body>
</html>
