<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👨‍⚕️ إدارة الأطباء - مركز يثرب الخيري التخصصي</title>
    
    <!-- ===== الأمن السيبراني ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- ===== Cloudinary SDK ===== -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --secondary: #fbbf24;
            --accent: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--light);
            min-height: 100vh;
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: 280px;
            background: rgba(5, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid rgba(251,191,36,0.2);
            padding: 30px 0;
            z-index: 100;
        }

        .sidebar-header { text-align: center; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; overflow: hidden; border: 3px solid var(--secondary); }
        .sidebar-logo img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-title { color: white; font-size: 1.2rem; font-weight: 700; }

        .sidebar-nav { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            margin-bottom: 5px;
        }
        .nav-item i { width: 24px; color: var(--secondary); }
        .nav-item:hover { background: rgba(14,124,158,0.2); color: white; transform: translateX(-5px); }
        .nav-item.active { background: var(--gradient-primary); color: white; }
        .nav-item.active i { color: white; }

        /* ===== المحتوى الرئيسي ===== */
        .main-content { margin-right: 280px; padding: 30px; min-height: 100vh; }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5,17,24,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-size: 0.9rem; color: var(--secondary); }
        .logout-btn { background: rgba(239,68,68,0.2); border: 1px solid var(--danger); color: var(--danger); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .add-btn { background: var(--gradient-primary); color: white; border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* ===== الجدول ===== */
        .table-card {
            background: rgba(5,17,24,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(251,191,36,0.1);
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 40px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 250px; }
        .search-box input:focus { outline: none; }
        .search-box button { background: transparent; border: none; color: var(--secondary); cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 12px; background: rgba(14,124,158,0.2); color: white; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .doctor-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-block; }
        .status-active { background: rgba(16,185,129,0.2); color: var(--accent); }
        .status-inactive { background: rgba(239,68,68,0.2); color: var(--danger); }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1rem; padding: 5px; transition: all 0.3s; }
        .action-btn:hover { color: var(--secondary); transform: scale(1.1); }
        .action-btn.delete:hover { color: var(--danger); }

        /* ===== مودال ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--secondary);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: var(--secondary); font-size: 1.5rem; }
        .modal-close { background: none; border: none; color: var(--gray); font-size: 1.5rem; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        .form-label { display: block; margin-bottom: 8px; color: var(--gray); font-weight: 600; }
        .form-label i { color: var(--secondary); margin-left: 5px; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--secondary); }
        .btn { padding: 12px 30px; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: var(--gradient-primary); color: white; border: 1px solid var(--secondary); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-danger { background: linear-gradient(145deg, #ef4444, #dc2626); color: white; }

        .schedule-row { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .schedule-day { flex: 1; min-width: 100px; }
        .schedule-time { flex: 2; display: flex; gap: 10px; }
        .schedule-time input { flex: 1; }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            display: none;
        }
        .message.success { background: var(--gradient-primary); }
        .message.error { background: linear-gradient(145deg, #ef4444, #dc2626); }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); position: fixed; z-index: 200; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .grid-2 { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="" alt="Logo" id="sidebarLogo"></div>
            <h3 class="sidebar-title">مركز يثرب</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
            <a href="clinic-settings.html" class="nav-item"><i class="fas fa-stethoscope"></i> إعدادات العيادات</a>
            <a href="lab-settings.html" class="nav-item"><i class="fas fa-flask"></i> إعدادات المعمل</a>
            <a href="doctors.html" class="nav-item active"><i class="fas fa-user-md"></i> الأطباء</a>
            <a href="lab-tests.html" class="nav-item"><i class="fas fa-vial"></i> التحاليل</a>
            <a href="board-members.html" class="nav-item"><i class="fas fa-users-cog"></i> مجلس الإدارة</a>
            <a href="caravans.html" class="nav-item"><i class="fas fa-truck-medical"></i> القوافل</a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> المواعيد</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>👨‍⚕️ إدارة الأطباء</h1></div>
            <div class="user-info">
                <div class="user-name" id="userName">جاري التحميل...</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
            <div class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('active')" style="display:none;">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة طبيب جديد</button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="بحث باسم أو تخصص..." onkeyup="searchDoctors()">
                </div>
            </div>
            <div class="table-responsive">
                <table id="doctorsTable">
                    <thead>
                        <tr><th>الصورة</th><th>الاسم</th><th>التخصص</th><th>سعر الكشف</th><th>الحالة</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="doctorsTableBody">
                        <tr><td colspan="6" style="text-align:center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل -->
    <div class="modal" id="doctorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">إضافة طبيب جديد</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="doctorForm">
                <input type="hidden" id="doctorId">
                <div class="grid-2">
                    <div class="form-group"><label class="form-label"><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" class="form-control" id="doctorName" required></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-stethoscope"></i> التخصص</label><input type="text" class="form-control" id="doctorSpecialty" required></div>
                    <div class="form-group full-width"><label class="form-label"><i class="fas fa-image"></i> الصورة</label><input type="url" class="form-control" id="doctorImage" placeholder="https://..."><button class="btn btn-primary" style="margin-top:10px;" onclick="uploadDoctorImage()"><i class="fas fa-cloud-upload-alt"></i> رفع صورة</button></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-tag"></i> التخصصات الفرعية</label><input type="text" class="form-control" id="doctorSubSpecialty" placeholder="سكر, ضغط, غدد (مفصولة بفواصل)"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-graduation-cap"></i> المؤهلات</label><input type="text" class="form-control" id="doctorQualifications" placeholder="دكتوراه الباطنة - جامعة القاهرة"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-clock"></i> سنوات الخبرة</label><input type="number" class="form-control" id="doctorExperience"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-language"></i> اللغات</label><input type="text" class="form-control" id="doctorLanguages" placeholder="العربية, الإنجليزية"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-dollar-sign"></i> سعر الكشف</label><input type="number" class="form-control" id="doctorPriceConsultation"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-dollar-sign"></i> سعر المتابعة</label><input type="number" class="form-control" id="doctorPriceFollowUp"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-dollar-sign"></i> سعر الطوارئ</label><input type="number" class="form-control" id="doctorPriceEmergency"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-calendar"></i> نوع الحجز</label>
                        <select class="form-control" id="doctorBookingType">
                            <option value="both">كلاهما</option>
                            <option value="online">أونلاين فقط</option>
                            <option value="walkin">حضور مباشر فقط</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-toggle-on"></i> الحالة</label>
                        <select class="form-control" id="doctorStatus">
                            <option value="true">متاح</option>
                            <option value="false">غير متاح</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-clock"></i> جدول المواعيد</label>
                    <div id="scheduleContainer"></div>
                    <button type="button" class="btn btn-outline" style="margin-top:10px;" onclick="addScheduleDay()"><i class="fas fa-plus"></i> إضافة يوم</button>
                </div>
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-file-alt"></i> السيرة الذاتية</label>
                    <textarea class="form-control" id="doctorBio" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-primary" onclick="saveDoctor()"><i class="fas fa-save"></i> حفظ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        // ============================================
        // الأمن السيبراني
        // ============================================
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.ctrlKey && ['c','x','u','s'].includes(e.key.toLowerCase())) e.preventDefault(); if (e.key === 'F12') e.preventDefault(); });
            document.addEventListener('selectstart', e => e.preventDefault());
        })();

        // ============================================
        // تهيئة Firebase
        // ============================================
        const firebaseConfig = { apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU", authDomain: "yathreb-10909.firebaseapp.com", projectId: "yathreb-10909" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // Cloudinary
        // ============================================
        let cloudinaryConfig = { cloudName: '', uploadPreset: 'yathreb_preset' };
        async function loadCloudinaryConfig() {
            const doc = await db.collection('cloudinaryConfig').doc('settings').get();
            if (doc.exists) { cloudinaryConfig.cloudName = doc.data().cloudName; cloudinaryConfig.uploadPreset = doc.data().uploadPreset; }
        }
        loadCloudinaryConfig();

        function uploadDoctorImage() {
            if (!cloudinaryConfig.cloudName) { showMessage('❌ لم يتم تهيئة Cloudinary بعد', 'error'); return; }
            const widget = cloudinary.createUploadWidget({ cloudName: cloudinaryConfig.cloudName, uploadPreset: cloudinaryConfig.uploadPreset, folder: 'yathreb/doctors' },
                (error, result) => { if (!error && result.event === 'success') { document.getElementById('doctorImage').value = result.info.secure_url; showMessage('✅ تم رفع الصورة بنجاح', 'success'); } });
            widget.open();
        }

        // ============================================
        // جدول المواعيد
        // ============================================
        let schedule = [];

        function renderSchedule() {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';
            schedule.forEach((item, index) => {
                container.innerHTML += `
                    <div class="schedule-row">
                        <div class="schedule-day">
                            <select class="form-control" onchange="updateSchedule(${index}, 'day', this.value)">
                                <option value="السبت" ${item.day === 'السبت' ? 'selected' : ''}>السبت</option>
                                <option value="الأحد" ${item.day === 'الأحد' ? 'selected' : ''}>الأحد</option>
                                <option value="الإثنين" ${item.day === 'الإثنين' ? 'selected' : ''}>الإثنين</option>
                                <option value="الثلاثاء" ${item.day === 'الثلاثاء' ? 'selected' : ''}>الثلاثاء</option>
                                <option value="الأربعاء" ${item.day === 'الأربعاء' ? 'selected' : ''}>الأربعاء</option>
                                <option value="الخميس" ${item.day === 'الخميس' ? 'selected' : ''}>الخميس</option>
                                <option value="الجمعة" ${item.day === 'الجمعة' ? 'selected' : ''}>الجمعة</option>
                            </select>
                        </div>
                        <div class="schedule-time">
                            <input type="time" class="form-control" value="${item.morningStart || ''}" placeholder="صباحاً من" onchange="updateSchedule(${index}, 'morningStart', this.value)">
                            <input type="time" class="form-control" value="${item.morningEnd || ''}" placeholder="إلى" onchange="updateSchedule(${index}, 'morningEnd', this.value)">
                            <input type="time" class="form-control" value="${item.eveningStart || ''}" placeholder="مساءً من" onchange="updateSchedule(${index}, 'eveningStart', this.value)">
                            <input type="time" class="form-control" value="${item.eveningEnd || ''}" placeholder="إلى" onchange="updateSchedule(${index}, 'eveningEnd', this.value)">
                        </div>
                        <button type="button" class="action-btn delete" onclick="removeSchedule(${index})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        function addScheduleDay() { schedule.push({ day: 'السبت', morningStart: '', morningEnd: '', eveningStart: '', eveningEnd: '' }); renderSchedule(); }
        function removeSchedule(index) { schedule.splice(index, 1); renderSchedule(); }
        function updateSchedule(index, field, value) { schedule[index][field] = value; }

        // ============================================
        // CRUD عمليات
        // ============================================
        let allDoctors = [];

        async function loadDoctors() {
            const snapshot = await db.collection('doctors').orderBy('name').get();
            allDoctors = [];
            snapshot.forEach(doc => { allDoctors.push({ id: doc.id, ...doc.data() }); });
            renderDoctorsTable(allDoctors);
        }

        function renderDoctorsTable(doctors) {
            const tbody = document.getElementById('doctorsTableBody');
            if (doctors.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا يوجد أطباء</td></tr>'; return; }
            tbody.innerHTML = '';
            doctors.forEach(doc => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${doc.imageUrl || 'https://via.placeholder.com/40/0e7c9e/ffffff?text=Dr'}" class="doctor-img"></td>
                        <td>${doc.name || '-'}</td>
                        <td>${doc.specialty || '-'}</td>
                        <td>${doc.prices?.consultation || '-'} ج.م</td>
                        <td><span class="status-badge ${doc.isAvailable ? 'status-active' : 'status-inactive'}">${doc.isAvailable ? 'متاح' : 'غير متاح'}</span></td>
                        <td class="action-buttons">
                            <button class="action-btn" onclick="editDoctor('${doc.id}')"><i class="fas fa-edit"></i></button>
                            <button class="action-btn delete" onclick="deleteDoctor('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function searchDoctors() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDoctors.filter(d => 
                (d.name && d.name.toLowerCase().includes(searchTerm)) ||
                (d.specialty && d.specialty.toLowerCase().includes(searchTerm))
            );
            renderDoctorsTable(filtered);
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة طبيب جديد';
            document.getElementById('doctorForm').reset();
            document.getElementById('doctorId').value = '';
            schedule = [];
            renderSchedule();
            document.getElementById('doctorModal').classList.add('active');
        }

        async function editDoctor(id) {
            const doc = await db.collection('doctors').doc(id).get();
            const data = doc.data();
            document.getElementById('modalTitle').textContent = 'تعديل بيانات الطبيب';
            document.getElementById('doctorId').value = id;
            document.getElementById('doctorName').value = data.name || '';
            document.getElementById('doctorSpecialty').value = data.specialty || '';
            document.getElementById('doctorImage').value = data.imageUrl || '';
            document.getElementById('doctorSubSpecialty').value = (data.subSpecialty || []).join(', ');
            document.getElementById('doctorQualifications').value = (data.qualifications || []).join(', ');
            document.getElementById('doctorExperience').value = data.experience || '';
            document.getElementById('doctorLanguages').value = (data.languages || []).join(', ');
            document.getElementById('doctorPriceConsultation').value = data.prices?.consultation || '';
            document.getElementById('doctorPriceFollowUp').value = data.prices?.followUp || '';
            document.getElementById('doctorPriceEmergency').value = data.prices?.emergency || '';
            document.getElementById('doctorBookingType').value = data.bookingType || 'both';
            document.getElementById('doctorStatus').value = data.isAvailable ? 'true' : 'false';
            document.getElementById('doctorBio').value = data.bio || '';
            schedule = data.schedule || [];
            renderSchedule();
            document.getElementById('doctorModal').classList.add('active');
        }

        async function saveDoctor() {
            const id = document.getElementById('doctorId').value;
            const doctorData = {
                name: document.getElementById('doctorName').value,
                specialty: document.getElementById('doctorSpecialty').value,
                imageUrl: document.getElementById('doctorImage').value,
                subSpecialty: document.getElementById('doctorSubSpecialty').value.split(',').map(s => s.trim()).filter(s => s),
                qualifications: document.getElementById('doctorQualifications').value.split(',').map(s => s.trim()).filter(s => s),
                experience: parseInt(document.getElementById('doctorExperience').value) || 0,
                languages: document.getElementById('doctorLanguages').value.split(',').map(s => s.trim()).filter(s => s),
                prices: {
                    consultation: parseInt(document.getElementById('doctorPriceConsultation').value) || 0,
                    followUp: parseInt(document.getElementById('doctorPriceFollowUp').value) || 0,
                    emergency: parseInt(document.getElementById('doctorPriceEmergency').value) || 0
                },
                bookingType: document.getElementById('doctorBookingType').value,
                isAvailable: document.getElementById('doctorStatus').value === 'true',
                schedule: schedule,
                bio: document.getElementById('doctorBio').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                if (id) { await db.collection('doctors').doc(id).update(doctorData); showMessage('✅ تم تحديث الطبيب بنجاح', 'success'); }
                else { await db.collection('doctors').add({ ...doctorData, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showMessage('✅ تم إضافة الطبيب بنجاح', 'success'); }
                closeModal();
                loadDoctors();
            } catch (error) { showMessage('❌ خطأ في الحفظ: ' + error.message, 'error'); }
        }

        async function deleteDoctor(id) {
            if (confirm('هل أنت متأكد من حذف هذا الطبيب؟')) {
                await db.collection('doctors').doc(id).delete();
                showMessage('✅ تم حذف الطبيب بنجاح', 'success');
                loadDoctors();
            }
        }

        function closeModal() { document.getElementById('doctorModal').classList.remove('active'); }

        // ============================================
        // مصادقة
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData || (userData.role !== 'super_admin' && userData.role !== 'admin')) { window.location.href = 'login.html'; return; }
            document.getElementById('userName').textContent = userData.displayName || user.email;
            loadDoctors();
        });

        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
