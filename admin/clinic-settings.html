<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏥 إعدادات العيادات - مركز يثرب الخيري التخصصي</title>
    
    <!-- ===== الأمن السيبراني ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- ===== Cloudinary SDK ===== -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --secondary: #fbbf24;
            --accent: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--light);
            min-height: 100vh;
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: 280px;
            background: rgba(5, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid rgba(251,191,36,0.2);
            padding: 30px 0;
            z-index: 100;
        }

        .sidebar-header {
            text-align: center;
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--secondary);
        }

        .sidebar-logo img { width: 100%; height: 100%; object-fit: cover; }

        .sidebar-title { color: white; font-size: 1.2rem; font-weight: 700; }

        .sidebar-nav { padding: 20px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .nav-item i { width: 24px; color: var(--secondary); }

        .nav-item:hover { background: rgba(14,124,158,0.2); color: white; transform: translateX(-5px); }

        .nav-item.active { background: var(--gradient-primary); color: white; }

        .nav-item.active i { color: white; }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            margin-right: 280px;
            padding: 30px;
            min-height: 100vh;
        }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5,17,24,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title h1 { font-size: 1.5rem; font-weight: 700; color: white; }

        .user-info { display: flex; align-items: center; gap: 15px; }

        .user-name { font-size: 0.9rem; color: var(--secondary); }

        .logout-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* ===== بطاقات الإعدادات ===== */
        .settings-card {
            background: rgba(5,17,24,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(251,191,36,0.1);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid rgba(251,191,36,0.2);
            padding-bottom: 15px;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .form-group { margin-bottom: 20px; }

        .form-group.full-width { grid-column: span 2; }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--gray);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-label i { color: var(--secondary); margin-left: 5px; }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus { outline: none; border-color: var(--secondary); }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary { background: var(--gradient-primary); color: white; border: 1px solid var(--secondary); }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }

        .btn-success { background: linear-gradient(145deg, #10b981, #059669); color: white; }

        .actions-bar { display: flex; gap: 20px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }

        .price-input { display: flex; align-items: center; gap: 10px; }

        .price-input input { flex: 1; }

        .day-schedule {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .day-schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .day-name { font-weight: 700; color: var(--secondary); }

        .time-inputs { display: flex; gap: 10px; flex-wrap: wrap; }

        .time-inputs input { flex: 1; }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            display: none;
        }

        .message.success { background: var(--gradient-primary); }
        .message.error { background: linear-gradient(145deg, #ef4444, #dc2626); }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); position: fixed; z-index: 200; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="" alt="Logo" id="sidebarLogo"></div>
            <h3 class="sidebar-title">مركز يثرب</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
            <a href="clinic-settings.html" class="nav-item active"><i class="fas fa-stethoscope"></i> إعدادات العيادات</a>
            <a href="lab-settings.html" class="nav-item"><i class="fas fa-flask"></i> إعدادات المعمل</a>
            <a href="doctors.html" class="nav-item"><i class="fas fa-user-md"></i> الأطباء</a>
            <a href="lab-tests.html" class="nav-item"><i class="fas fa-vial"></i> التحاليل</a>
            <a href="board-members.html" class="nav-item"><i class="fas fa-users-cog"></i> مجلس الإدارة</a>
            <a href="caravans.html" class="nav-item"><i class="fas fa-truck-medical"></i> القوافل</a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> المواعيد</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>🏥 إعدادات العيادات</h1></div>
            <div class="user-info">
                <div class="user-name" id="userName">جاري التحميل...</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
            <div class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('active')" style="display:none;">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="settings-card">
            <div class="card-title"><i class="fas fa-info-circle"></i> معلومات العيادات</div>
            <div class="grid-2">
                <div class="form-group"><label class="form-label"><i class="fas fa-building"></i> اسم العيادات</label><input type="text" class="form-control" id="clinicName" placeholder="عيادات يثرب التخصصية"></div>
                <div class="form-group"><label class="form-label"><i class="fas fa-image"></i> لوجو العيادات</label><input type="url" class="form-control" id="clinicLogo" placeholder="https://..."><button class="btn btn-primary" style="margin-top:10px; width:100%;" onclick="uploadLogo('clinic')"><i class="fas fa-cloud-upload-alt"></i> رفع صورة</button></div>
                <div class="form-group"><label class="form-label"><i class="fab fa-whatsapp"></i> واتساب العيادات</label><input type="text" class="form-control" id="clinicWhatsapp" placeholder="966500000000"></div>
                <div class="form-group"><label class="form-label"><i class="fab fa-facebook"></i> فيسبوك العيادات</label><input type="url" class="form-control" id="clinicFacebook" placeholder="https://facebook.com/..."></div>
            </div>
        </div>

        <div class="settings-card">
            <div class="card-title"><i class="fas fa-dollar-sign"></i> أسعار الكشوفات</div>
            <div class="grid-3">
                <div class="form-group"><label class="form-label">كشف عادي</label><input type="number" class="form-control" id="priceConsultation" placeholder="300"></div>
                <div class="form-group"><label class="form-label">متابعة</label><input type="number" class="form-control" id="priceFollowUp" placeholder="200"></div>
                <div class="form-group"><label class="form-label">طوارئ</label><input type="number" class="form-control" id="priceEmergency" placeholder="500"></div>
                <div class="form-group"><label class="form-label">أشعة عادية</label><input type="number" class="form-control" id="priceXray" placeholder="150"></div>
                <div class="form-group"><label class="form-label">سونار</label><input type="number" class="form-control" id="priceUltrasound" placeholder="300"></div>
                <div class="form-group"><label class="form-label">مقطعية</label><input type="number" class="form-control" id="priceCT" placeholder="500"></div>
            </div>
        </div>

        <div class="settings-card">
            <div class="card-title"><i class="fas fa-clock"></i> مواعيد العمل</div>
            <div id="workingHoursContainer"></div>
        </div>

        <div class="settings-card">
            <div class="card-title"><i class="fas fa-tags"></i> أسعار القوافل (خصومات)</div>
            <div class="grid-3">
                <div class="form-group"><label class="form-label">خصم الكشف العادي (%)</label><input type="number" class="form-control" id="caravanConsultation" placeholder="30"></div>
                <div class="form-group"><label class="form-label">خصم المتابعة (%)</label><input type="number" class="form-control" id="caravanFollowUp" placeholder="25"></div>
                <div class="form-group"><label class="form-label">خصم الأشعة (%)</label><input type="number" class="form-control" id="caravanRadiology" placeholder="20"></div>
            </div>
        </div>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="saveAllSettings()"><i class="fas fa-save"></i> حفظ الإعدادات</button>
            <button class="btn btn-success" onclick="loadAllSettings()"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        // ============================================
        // الأمن السيبراني
        // ============================================
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.ctrlKey && ['c','x','u','s'].includes(e.key.toLowerCase())) e.preventDefault(); if (e.key === 'F12') e.preventDefault(); });
            document.addEventListener('selectstart', e => e.preventDefault());
        })();

        // ============================================
        // تهيئة Firebase
        // ============================================
        const firebaseConfig = { apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU", authDomain: "yathreb-10909.firebaseapp.com", projectId: "yathreb-10909" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // Cloudinary
        // ============================================
        const cloudinaryConfig = { cloudName: '', uploadPreset: 'yathreb_preset' };
        
        async function loadCloudinaryConfig() {
            const doc = await db.collection('cloudinaryConfig').doc('settings').get();
            if (doc.exists) { cloudinaryConfig.cloudName = doc.data().cloudName; cloudinaryConfig.uploadPreset = doc.data().uploadPreset; }
        }
        loadCloudinaryConfig();

        function uploadLogo(target) {
            if (!cloudinaryConfig.cloudName) { showMessage('❌ لم يتم تهيئة Cloudinary بعد', 'error'); return; }
            const widget = cloudinary.createUploadWidget({ cloudName: cloudinaryConfig.cloudName, uploadPreset: cloudinaryConfig.uploadPreset, folder: `yathreb/${target}` },
                (error, result) => { if (!error && result.event === 'success') { document.getElementById(`${target}Logo`).value = result.info.secure_url; showMessage('✅ تم رفع الصورة بنجاح', 'success'); } });
            widget.open();
        }

        // ============================================
        // مواعيد العمل
        // ============================================
        const days = ['السبت', 'الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'];
        
        function renderWorkingHours(hours) {
            const container = document.getElementById('workingHoursContainer');
            container.innerHTML = '';
            days.forEach(day => {
                const dayData = hours?.[day] || { morning: { start: '', end: '' }, evening: { start: '', end: '' }, isOpen: true };
                container.innerHTML += `
                    <div class="day-schedule">
                        <div class="day-schedule-header">
                            <span class="day-name">${day}</span>
                            <label><input type="checkbox" id="open_${day}" ${dayData.isOpen !== false ? 'checked' : ''}> مفتوح</label>
                        </div>
                        <div class="time-inputs">
                            <input type="time" id="morning_start_${day}" value="${dayData.morning?.start || ''}" placeholder="صباحاً من" class="form-control">
                            <input type="time" id="morning_end_${day}" value="${dayData.morning?.end || ''}" placeholder="إلى" class="form-control">
                            <input type="time" id="evening_start_${day}" value="${dayData.evening?.start || ''}" placeholder="مساءً من" class="form-control">
                            <input type="time" id="evening_end_${day}" value="${dayData.evening?.end || ''}" placeholder="إلى" class="form-control">
                        </div>
                    </div>`;
            });
        }

        function collectWorkingHours() {
            const hours = {};
            days.forEach(day => {
                const isOpen = document.getElementById(`open_${day}`)?.checked;
                hours[day] = {
                    isOpen: isOpen,
                    morning: { start: document.getElementById(`morning_start_${day}`)?.value || '', end: document.getElementById(`morning_end_${day}`)?.value || '' },
                    evening: { start: document.getElementById(`evening_start_${day}`)?.value || '', end: document.getElementById(`evening_end_${day}`)?.value || '' }
                };
            });
            return hours;
        }

        // ============================================
        // حفظ وتحميل
        // ============================================
        async function saveAllSettings() {
            const settings = {
                name: document.getElementById('clinicName').value,
                logoUrl: document.getElementById('clinicLogo').value,
                whatsapp: document.getElementById('clinicWhatsapp').value,
                facebook: document.getElementById('clinicFacebook').value,
                prices: {
                    consultation: parseInt(document.getElementById('priceConsultation').value) || 0,
                    followUp: parseInt(document.getElementById('priceFollowUp').value) || 0,
                    emergency: parseInt(document.getElementById('priceEmergency').value) || 0,
                    radiology: {
                        xray: parseInt(document.getElementById('priceXray').value) || 0,
                        ultrasound: parseInt(document.getElementById('priceUltrasound').value) || 0,
                        ct: parseInt(document.getElementById('priceCT').value) || 0
                    }
                },
                workingHours: collectWorkingHours(),
                caravans: {
                    consultationDiscount: parseInt(document.getElementById('caravanConsultation').value) || 0,
                    followUpDiscount: parseInt(document.getElementById('caravanFollowUp').value) || 0,
                    radiologyDiscount: parseInt(document.getElementById('caravanRadiology').value) || 0
                },
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                await db.collection('settings').doc('clinic').set(settings, { merge: true });
                showMessage('✅ تم حفظ الإعدادات بنجاح', 'success');
            } catch (error) { showMessage('❌ خطأ في الحفظ: ' + error.message, 'error'); }
        }

        async function loadAllSettings() {
            try {
                const doc = await db.collection('settings').doc('clinic').get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('clinicName').value = data.name || '';
                    document.getElementById('clinicLogo').value = data.logoUrl || '';
                    document.getElementById('clinicWhatsapp').value = data.whatsapp || '';
                    document.getElementById('clinicFacebook').value = data.facebook || '';
                    if (data.prices) {
                        document.getElementById('priceConsultation').value = data.prices.consultation || '';
                        document.getElementById('priceFollowUp').value = data.prices.followUp || '';
                        document.getElementById('priceEmergency').value = data.prices.emergency || '';
                        document.getElementById('priceXray').value = data.prices.radiology?.xray || '';
                        document.getElementById('priceUltrasound').value = data.prices.radiology?.ultrasound || '';
                        document.getElementById('priceCT').value = data.prices.radiology?.ct || '';
                    }
                    if (data.caravans) {
                        document.getElementById('caravanConsultation').value = data.caravans.consultationDiscount || '';
                        document.getElementById('caravanFollowUp').value = data.caravans.followUpDiscount || '';
                        document.getElementById('caravanRadiology').value = data.caravans.radiologyDiscount || '';
                    }
                    renderWorkingHours(data.workingHours);
                }
            } catch (error) { showMessage('❌ خطأ في التحميل', 'error'); }
        }

        // ============================================
        // مصادقة
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData || (userData.role !== 'super_admin' && userData.role !== 'admin')) { window.location.href = 'login.html'; return; }
            document.getElementById('userName').textContent = userData.displayName || user.email;
            loadAllSettings();
        });

        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
