<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 إدارة مجلس الإدارة - مركز يثرب الخيري التخصصي</title>
    
    <!-- ===== الأمن السيبراني ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- ===== Cloudinary SDK ===== -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --secondary: #fbbf24;
            --accent: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--light);
            min-height: 100vh;
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: 280px;
            background: rgba(5, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid rgba(251,191,36,0.2);
            padding: 30px 0;
            z-index: 100;
        }

        .sidebar-header { text-align: center; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; overflow: hidden; border: 3px solid var(--secondary); }
        .sidebar-logo img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-title { color: white; font-size: 1.2rem; font-weight: 700; }

        .sidebar-nav { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            margin-bottom: 5px;
        }
        .nav-item i { width: 24px; color: var(--secondary); }
        .nav-item:hover { background: rgba(14,124,158,0.2); color: white; transform: translateX(-5px); }
        .nav-item.active { background: var(--gradient-primary); color: white; }
        .nav-item.active i { color: white; }

        /* ===== المحتوى الرئيسي ===== */
        .main-content { margin-right: 280px; padding: 30px; min-height: 100vh; }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5,17,24,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-size: 0.9rem; color: var(--secondary); }
        .logout-btn { background: rgba(239,68,68,0.2); border: 1px solid var(--danger); color: var(--danger); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .add-btn { background: var(--gradient-primary); color: white; border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* ===== الجدول ===== */
        .table-card {
            background: rgba(5,17,24,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(251,191,36,0.1);
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 40px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 250px; }
        .search-box input:focus { outline: none; }
        .search-box button { background: transparent; border: none; color: var(--secondary); cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 12px; background: rgba(14,124,158,0.2); color: white; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .member-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-block; }
        .status-show { background: rgba(16,185,129,0.2); color: var(--accent); }
        .status-hide { background: rgba(239,68,68,0.2); color: var(--danger); }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1rem; padding: 5px; transition: all 0.3s; }
        .action-btn:hover { color: var(--secondary); transform: scale(1.1); }
        .action-btn.delete:hover { color: var(--danger); }

        /* ===== مودال ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--secondary);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: var(--secondary); font-size: 1.5rem; }
        .modal-close { background: none; border: none; color: var(--gray); font-size: 1.5rem; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        .form-label { display: block; margin-bottom: 8px; color: var(--gray); font-weight: 600; }
        .form-label i { color: var(--secondary); margin-left: 5px; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--secondary); }
        textarea.form-control { min-height: 120px; resize: vertical; }
        .btn { padding: 12px 30px; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: var(--gradient-primary); color: white; border: 1px solid var(--secondary); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-danger { background: linear-gradient(145deg, #ef4444, #dc2626); color: white; }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            display: none;
        }
        .message.success { background: var(--gradient-primary); }
        .message.error { background: linear-gradient(145deg, #ef4444, #dc2626); }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); position: fixed; z-index: 200; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .grid-2 { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="" alt="Logo" id="sidebarLogo"></div>
            <h3 class="sidebar-title">مركز يثرب</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
            <a href="clinic-settings.html" class="nav-item"><i class="fas fa-stethoscope"></i> إعدادات العيادات</a>
            <a href="lab-settings.html" class="nav-item"><i class="fas fa-flask"></i> إعدادات المعمل</a>
            <a href="doctors.html" class="nav-item"><i class="fas fa-user-md"></i> الأطباء</a>
            <a href="lab-tests.html" class="nav-item"><i class="fas fa-vial"></i> التحاليل</a>
            <a href="board-members.html" class="nav-item active"><i class="fas fa-users-cog"></i> مجلس الإدارة</a>
            <a href="caravans.html" class="nav-item"><i class="fas fa-truck-medical"></i> القوافل</a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> المواعيد</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>👑 إدارة مجلس الإدارة</h1></div>
            <div class="user-info">
                <div class="user-name" id="userName">جاري التحميل...</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
            <div class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('active')" style="display:none;">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة عضو جديد</button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="بحث باسم أو منصب..." onkeyup="filterMembers()">
                </div>
            </div>
            <div class="table-responsive">
                <table id="membersTable">
                    <thead>
                        <tr><th>الصورة</th><th>الاسم</th><th>المنصب</th><th>الظهور في الرئيسية</th><th>الترتيب</th><th>الإجراءات</th> </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr><td colspan="6" style="text-align:center;">جاري التحميل...</td> </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل -->
    <div class="modal" id="memberModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">إضافة عضو جديد</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="memberForm">
                <input type="hidden" id="memberId">
                <div class="grid-2">
                    <div class="form-group"><label class="form-label"><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" class="form-control" id="memberName" required></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-briefcase"></i> المنصب</label><input type="text" class="form-control" id="memberPosition" required></div>
                    <div class="form-group full-width"><label class="form-label"><i class="fas fa-image"></i> الصورة الشخصية</label><input type="url" class="form-control" id="memberImage" placeholder="https://..."><button class="btn btn-primary" style="margin-top:10px;" onclick="uploadMemberImage()"><i class="fas fa-cloud-upload-alt"></i> رفع صورة</button></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-sort-numeric-down"></i> ترتيب الظهور</label><input type="number" class="form-control" id="memberOrder" placeholder="1"></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-eye"></i> الظهور في الصفحة الرئيسية</label>
                        <select class="form-control" id="memberShowInHome">
                            <option value="true">نعم</option>
                            <option value="false">لا</option>
                        </select>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-envelope"></i> عنوان الكلمة</label>
                    <input type="text" class="form-control" id="memberMessageTitle" placeholder="مثال: كلمة رئيس مجلس الإدارة">
                </div>
                <div class="form-group full-width">
                    <label class="form-label"><i class="fas fa-comment"></i> نص الكلمة</label>
                    <textarea class="form-control" id="memberMessage" rows="5" placeholder="نص الكلمة..."></textarea>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-primary" onclick="saveMember()"><i class="fas fa-save"></i> حفظ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- مودال عرض الكلمة -->
    <div class="modal" id="messageModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="messageModalTitle"></h3>
                <button class="modal-close" onclick="closeMessageModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="messageModalContent" style="color: var(--light); font-size: 1.1rem; line-height: 1.8; margin: 20px 0;"></div>
            <button class="btn btn-primary" onclick="closeMessageModal()">إغلاق</button>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        // ============================================
        // الأمن السيبراني
        // ============================================
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.ctrlKey && ['c','x','u','s'].includes(e.key.toLowerCase())) e.preventDefault(); if (e.key === 'F12') e.preventDefault(); });
            document.addEventListener('selectstart', e => e.preventDefault());
        })();

        // ============================================
        // تهيئة Firebase
        // ============================================
        const firebaseConfig = { apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU", authDomain: "yathreb-10909.firebaseapp.com", projectId: "yathreb-10909" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // Cloudinary
        // ============================================
        let cloudinaryConfig = { cloudName: '', uploadPreset: 'yathreb_preset' };
        async function loadCloudinaryConfig() {
            const doc = await db.collection('cloudinaryConfig').doc('settings').get();
            if (doc.exists) { cloudinaryConfig.cloudName = doc.data().cloudName; cloudinaryConfig.uploadPreset = doc.data().uploadPreset; }
        }
        loadCloudinaryConfig();

        function uploadMemberImage() {
            if (!cloudinaryConfig.cloudName) { showMessage('❌ لم يتم تهيئة Cloudinary بعد', 'error'); return; }
            const widget = cloudinary.createUploadWidget({ cloudName: cloudinaryConfig.cloudName, uploadPreset: cloudinaryConfig.uploadPreset, folder: 'yathreb/board' },
                (error, result) => { if (!error && result.event === 'success') { document.getElementById('memberImage').value = result.info.secure_url; showMessage('✅ تم رفع الصورة بنجاح', 'success'); } });
            widget.open();
        }

        // ============================================
        // عمليات الأعضاء
        // ============================================
        let allMembers = [];

        async function loadMembers() {
            const snapshot = await db.collection('boardMembers').orderBy('order').get();
            allMembers = [];
            snapshot.forEach(doc => { allMembers.push({ id: doc.id, ...doc.data() }); });
            renderMembersTable(allMembers);
        }

        function renderMembersTable(members) {
            const tbody = document.getElementById('membersTableBody');
            if (members.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا يوجد أعضاء</td></tr>'; return; }
            tbody.innerHTML = '';
            members.forEach(member => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${member.imageUrl || 'https://via.placeholder.com/45/0e7c9e/ffffff?text=Member'}" class="member-img"></td>
                        <td>${member.name || '-'}</td>
                        <td>${member.position || '-'}</td>
                        <td><span class="status-badge ${member.showInHome ? 'status-show' : 'status-hide'}">${member.showInHome ? 'يظهر' : 'لا يظهر'}</span></td>
                        <td>${member.order || 0}</td>
                        <td class="action-buttons">
                            <button class="action-btn" onclick="viewMessage('${member.id}')"><i class="fas fa-envelope"></i></button>
                            <button class="action-btn" onclick="editMember('${member.id}')"><i class="fas fa-edit"></i></button>
                            <button class="action-btn delete" onclick="deleteMember('${member.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function filterMembers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMembers.filter(m => 
                (m.name && m.name.toLowerCase().includes(search)) ||
                (m.position && m.position.toLowerCase().includes(search))
            );
            renderMembersTable(filtered);
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة عضو جديد';
            document.getElementById('memberForm').reset();
            document.getElementById('memberId').value = '';
            document.getElementById('memberOrder').value = allMembers.length + 1;
            document.getElementById('memberShowInHome').value = 'true';
            document.getElementById('memberModal').classList.add('active');
        }

        async function editMember(id) {
            const doc = await db.collection('boardMembers').doc(id).get();
            const data = doc.data();
            document.getElementById('modalTitle').textContent = 'تعديل بيانات العضو';
            document.getElementById('memberId').value = id;
            document.getElementById('memberName').value = data.name || '';
            document.getElementById('memberPosition').value = data.position || '';
            document.getElementById('memberImage').value = data.imageUrl || '';
            document.getElementById('memberOrder').value = data.order || '';
            document.getElementById('memberShowInHome').value = data.showInHome ? 'true' : 'false';
            document.getElementById('memberMessageTitle').value = data.messageTitle || '';
            document.getElementById('memberMessage').value = data.message || '';
            document.getElementById('memberModal').classList.add('active');
        }

        async function saveMember() {
            const id = document.getElementById('memberId').value;
            const memberData = {
                name: document.getElementById('memberName').value,
                position: document.getElementById('memberPosition').value,
                imageUrl: document.getElementById('memberImage').value,
                order: parseInt(document.getElementById('memberOrder').value) || 0,
                showInHome: document.getElementById('memberShowInHome').value === 'true',
                messageTitle: document.getElementById('memberMessageTitle').value,
                message: document.getElementById('memberMessage').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!memberData.name) { showMessage('❌ الرجاء إدخال الاسم', 'error'); return; }
            if (!memberData.position) { showMessage('❌ الرجاء إدخال المنصب', 'error'); return; }
            try {
                if (id) { await db.collection('boardMembers').doc(id).update(memberData); showMessage('✅ تم تحديث العضو بنجاح', 'success'); }
                else { await db.collection('boardMembers').add({ ...memberData, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showMessage('✅ تم إضافة العضو بنجاح', 'success'); }
                closeModal();
                loadMembers();
            } catch (error) { showMessage('❌ خطأ في الحفظ: ' + error.message, 'error'); }
        }

        async function deleteMember(id) {
            if (confirm('هل أنت متأكد من حذف هذا العضو؟')) {
                await db.collection('boardMembers').doc(id).delete();
                showMessage('✅ تم حذف العضو بنجاح', 'success');
                loadMembers();
            }
        }

        async function viewMessage(id) {
            const doc = await db.collection('boardMembers').doc(id).get();
            const data = doc.data();
            document.getElementById('messageModalTitle').textContent = data.messageTitle || `كلمة ${data.name}`;
            document.getElementById('messageModalContent').innerHTML = (data.message || 'لا توجد كلمة بعد').replace(/\n/g, '<br>');
            document.getElementById('messageModal').classList.add('active');
        }

        function closeModal() { document.getElementById('memberModal').classList.remove('active'); }
        function closeMessageModal() { document.getElementById('messageModal').classList.remove('active'); }

        // ============================================
        // مصادقة
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData || (userData.role !== 'super_admin' && userData.role !== 'admin')) { window.location.href = 'login.html'; return; }
            document.getElementById('userName').textContent = userData.displayName || user.email;
            loadMembers();
        });

        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
