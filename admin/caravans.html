<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚚 إدارة القوافل الخيرية - مركز يثرب الخيري التخصصي</title>
    
    <!-- ===== الأمن السيبراني ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- ===== Cloudinary SDK ===== -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --secondary: #fbbf24;
            --accent: #10b981;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--light);
            min-height: 100vh;
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: 280px;
            background: rgba(5, 17, 24, 0.95);
            backdrop-filter: blur(20px);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid rgba(251,191,36,0.2);
            padding: 30px 0;
            z-index: 100;
        }

        .sidebar-header { text-align: center; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; overflow: hidden; border: 3px solid var(--secondary); }
        .sidebar-logo img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-title { color: white; font-size: 1.2rem; font-weight: 700; }

        .sidebar-nav { padding: 20px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: var(--gray);
            text-decoration: none;
            border-radius: 15px;
            transition: all 0.3s;
            margin-bottom: 5px;
        }
        .nav-item i { width: 24px; color: var(--secondary); }
        .nav-item:hover { background: rgba(14,124,158,0.2); color: white; transform: translateX(-5px); }
        .nav-item.active { background: var(--gradient-primary); color: white; }
        .nav-item.active i { color: white; }

        /* ===== المحتوى الرئيسي ===== */
        .main-content { margin-right: 280px; padding: 30px; min-height: 100vh; }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5,17,24,0.7);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-title h1 { font-size: 1.5rem; font-weight: 700; color: white; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { font-size: 0.9rem; color: var(--secondary); }
        .logout-btn { background: rgba(239,68,68,0.2); border: 1px solid var(--danger); color: var(--danger); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .add-btn { background: var(--gradient-primary); color: white; border: none; padding: 12px 25px; border-radius: 40px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* ===== الفلاتر ===== */
        .filters-bar {
            background: rgba(5,17,24,0.5);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(251,191,36,0.2);
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        /* ===== الجدول ===== */
        .table-card {
            background: rgba(5,17,24,0.6);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(251,191,36,0.1);
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-box { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 40px; }
        .search-box input { background: transparent; border: none; color: white; padding: 10px; width: 250px; }
        .search-box input:focus { outline: none; }
        .search-box button { background: transparent; border: none; color: var(--secondary); cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 12px; background: rgba(14,124,158,0.2); color: white; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-block; }
        .status-active { background: rgba(16,185,129,0.2); color: var(--accent); }
        .status-upcoming { background: rgba(251,191,36,0.2); color: var(--secondary); }
        .status-ended { background: rgba(239,68,68,0.2); color: var(--danger); }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1rem; padding: 5px; transition: all 0.3s; }
        .action-btn:hover { color: var(--secondary); transform: scale(1.1); }
        .action-btn.delete:hover { color: var(--danger); }

        /* ===== مودال ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--dark);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--secondary);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { color: var(--secondary); font-size: 1.5rem; }
        .modal-close { background: none; border: none; color: var(--gray); font-size: 1.5rem; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        .form-label { display: block; margin-bottom: 8px; color: var(--gray); font-weight: 600; }
        .form-label i { color: var(--secondary); margin-left: 5px; }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--secondary); }
        textarea.form-control { min-height: 80px; resize: vertical; }
        .btn { padding: 12px 30px; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: var(--gradient-primary); color: white; border: 1px solid var(--secondary); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-glow); }
        .btn-danger { background: linear-gradient(145deg, #ef4444, #dc2626); color: white; }

        .service-item {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .service-name { flex: 2; }
        .service-discount { flex: 1; min-width: 100px; }
        .service-free { flex: 1; min-width: 80px; }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            z-index: 1001;
            animation: slideIn 0.3s ease;
            display: none;
        }
        .message.success { background: var(--gradient-primary); }
        .message.error { background: linear-gradient(145deg, #ef4444, #dc2626); }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(100%); position: fixed; z-index: 200; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .grid-2 { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><img src="" alt="Logo" id="sidebarLogo"></div>
            <h3 class="sidebar-title">مركز يثرب</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
            <a href="clinic-settings.html" class="nav-item"><i class="fas fa-stethoscope"></i> إعدادات العيادات</a>
            <a href="lab-settings.html" class="nav-item"><i class="fas fa-flask"></i> إعدادات المعمل</a>
            <a href="doctors.html" class="nav-item"><i class="fas fa-user-md"></i> الأطباء</a>
            <a href="lab-tests.html" class="nav-item"><i class="fas fa-vial"></i> التحاليل</a>
            <a href="board-members.html" class="nav-item"><i class="fas fa-users-cog"></i> مجلس الإدارة</a>
            <a href="caravans.html" class="nav-item active"><i class="fas fa-truck-medical"></i> القوافل</a>
            <a href="appointments.html" class="nav-item"><i class="fas fa-calendar-check"></i> المواعيد</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><h1>🚚 إدارة القوافل الخيرية</h1></div>
            <div class="user-info">
                <div class="user-name" id="userName">جاري التحميل...</div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
            <div class="toggle-sidebar" onclick="document.getElementById('sidebar').classList.toggle('active')" style="display:none;">
                <i class="fas fa-bars"></i>
            </div>
        </div>

        <div class="filters-bar">
            <select id="statusFilter" class="filter-select" onchange="filterCaravans()">
                <option value="all">جميع القوافل</option>
                <option value="active">نشطة حالياً</option>
                <option value="upcoming">قادمة</option>
                <option value="ended">منتهية</option>
            </select>
            <select id="typeFilter" class="filter-select" onchange="filterCaravans()">
                <option value="all">جميع الأنواع</option>
                <option value="discount">خصومات</option>
                <option value="free">خدمات مجانية</option>
            </select>
        </div>

        <div class="table-card">
            <div class="table-header">
                <button class="add-btn" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة قافلة جديدة</button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="بحث باسم القافلة..." onkeyup="filterCaravans()">
                </div>
            </div>
            <div class="table-responsive">
                <table id="caravansTable">
                    <thead>
                        <tr><th>الصورة</th><th>الاسم</th><th>النوع</th><th>الفترة</th><th>الحالة</th><th>الإجراءات</th> </tr>
                    </thead>
                    <tbody id="caravansTableBody">
                        <tr><td colspan="6" style="text-align:center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل -->
    <div class="modal" id="caravanModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">إضافة قافلة جديدة</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="caravanForm">
                <input type="hidden" id="caravanId">
                <div class="grid-2">
                    <div class="form-group full-width"><label class="form-label"><i class="fas fa-tag"></i> اسم القافلة</label><input type="text" class="form-control" id="caravanName" required></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-calendar-alt"></i> تاريخ البداية</label><input type="date" class="form-control" id="caravanStartDate" required></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-calendar-check"></i> تاريخ النهاية</label><input type="date" class="form-control" id="caravanEndDate" required></div>
                    <div class="form-group"><label class="form-label"><i class="fas fa-tag"></i> نوع القافلة</label>
                        <select class="form-control" id="caravanType" onchange="toggleTypeFields()">
                            <option value="discount">خصومات على الأسعار</option>
                            <option value="free">خدمات مجانية</option>
                        </select>
                    </div>
                    <div class="form-group full-width"><label class="form-label"><i class="fas fa-image"></i> الصورة</label><input type="url" class="form-control" id="caravanImage" placeholder="https://..."><button class="btn btn-primary" style="margin-top:10px;" onclick="uploadCaravanImage()"><i class="fas fa-cloud-upload-alt"></i> رفع صورة</button></div>
                </div>

                <div id="discountFields">
                    <div class="card-title" style="margin-top:20px;"><i class="fas fa-percent"></i> خصومات القافلة</div>
                    <div id="discountServicesContainer"></div>
                    <button type="button" class="btn btn-outline" onclick="addDiscountService()"><i class="fas fa-plus"></i> إضافة خدمة مخفضة</button>
                </div>

                <div id="freeFields" style="display:none;">
                    <div class="card-title" style="margin-top:20px;"><i class="fas fa-gift"></i> خدمات مجانية</div>
                    <div id="freeServicesContainer"></div>
                    <button type="button" class="btn btn-outline" onclick="addFreeService()"><i class="fas fa-plus"></i> إضافة خدمة مجانية</button>
                </div>

                <div class="form-group full-width"><label class="form-label"><i class="fas fa-align-right"></i> وصف القافلة</label><textarea class="form-control" id="caravanDescription" rows="3"></textarea></div>
                
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-primary" onclick="saveCaravan()"><i class="fas fa-save"></i> حفظ</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()"><i class="fas fa-times"></i> إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        // ============================================
        // الأمن السيبراني
        // ============================================
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => { if (e.ctrlKey && ['c','x','u','s'].includes(e.key.toLowerCase())) e.preventDefault(); if (e.key === 'F12') e.preventDefault(); });
            document.addEventListener('selectstart', e => e.preventDefault());
        })();

        // ============================================
        // تهيئة Firebase
        // ============================================
        const firebaseConfig = { apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU", authDomain: "yathreb-10909.firebaseapp.com", projectId: "yathreb-10909" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ============================================
        // Cloudinary
        // ============================================
        let cloudinaryConfig = { cloudName: '', uploadPreset: 'yathreb_preset' };
        async function loadCloudinaryConfig() {
            const doc = await db.collection('cloudinaryConfig').doc('settings').get();
            if (doc.exists) { cloudinaryConfig.cloudName = doc.data().cloudName; cloudinaryConfig.uploadPreset = doc.data().uploadPreset; }
        }
        loadCloudinaryConfig();

        function uploadCaravanImage() {
            if (!cloudinaryConfig.cloudName) { showMessage('❌ لم يتم تهيئة Cloudinary بعد', 'error'); return; }
            const widget = cloudinary.createUploadWidget({ cloudName: cloudinaryConfig.cloudName, uploadPreset: cloudinaryConfig.uploadPreset, folder: 'yathreb/caravans' },
                (error, result) => { if (!error && result.event === 'success') { document.getElementById('caravanImage').value = result.info.secure_url; showMessage('✅ تم رفع الصورة بنجاح', 'success'); } });
            widget.open();
        }

        // ============================================
        // إدارة الخدمات
        // ============================================
        let discountServices = [];
        let freeServices = [];

        function renderDiscountServices() {
            const container = document.getElementById('discountServicesContainer');
            container.innerHTML = '';
            discountServices.forEach((service, index) => {
                container.innerHTML += `
                    <div class="service-item">
                        <input type="text" class="form-control service-name" value="${service.name}" placeholder="اسم الخدمة" onchange="updateDiscountService(${index}, 'name', this.value)">
                        <input type="text" class="form-control service-discount" value="${service.discount}" placeholder="الخصم %" onchange="updateDiscountService(${index}, 'discount', this.value)">
                        <button type="button" class="action-btn delete" onclick="removeDiscountService(${index})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        function renderFreeServices() {
            const container = document.getElementById('freeServicesContainer');
            container.innerHTML = '';
            freeServices.forEach((service, index) => {
                container.innerHTML += `
                    <div class="service-item">
                        <input type="text" class="form-control service-name" value="${service}" placeholder="اسم الخدمة" onchange="updateFreeService(${index}, this.value)">
                        <button type="button" class="action-btn delete" onclick="removeFreeService(${index})"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
        }

        function addDiscountService() { discountServices.push({ name: '', discount: '' }); renderDiscountServices(); }
        function removeDiscountService(index) { discountServices.splice(index, 1); renderDiscountServices(); }
        function updateDiscountService(index, field, value) { discountServices[index][field] = value; }
        function addFreeService() { freeServices.push(''); renderFreeServices(); }
        function removeFreeService(index) { freeServices.splice(index, 1); renderFreeServices(); }
        function updateFreeService(index, value) { freeServices[index] = value; }

        function toggleTypeFields() {
            const type = document.getElementById('caravanType').value;
            if (type === 'discount') {
                document.getElementById('discountFields').style.display = 'block';
                document.getElementById('freeFields').style.display = 'none';
            } else {
                document.getElementById('discountFields').style.display = 'none';
                document.getElementById('freeFields').style.display = 'block';
            }
        }

        // ============================================
        // عمليات القوافل
        // ============================================
        let allCaravans = [];

        async function loadCaravans() {
            const snapshot = await db.collection('caravans').orderBy('startDate', 'desc').get();
            allCaravans = [];
            snapshot.forEach(doc => { allCaravans.push({ id: doc.id, ...doc.data() }); });
            filterCaravans();
        }

        function getCaravanStatus(startDate, endDate) {
            const today = new Date().toISOString().split('T')[0];
            if (startDate <= today && endDate >= today) return 'active';
            if (startDate > today) return 'upcoming';
            return 'ended';
        }

        function filterCaravans() {
            const status = document.getElementById('statusFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allCaravans.filter(c => {
                const caravanStatus = getCaravanStatus(c.startDate, c.endDate);
                if (status !== 'all' && caravanStatus !== status) return false;
                if (type !== 'all' && c.type !== type) return false;
                if (search && !c.name?.toLowerCase().includes(search)) return false;
                return true;
            });
            renderCaravansTable(filtered);
        }

        function renderCaravansTable(caravans) {
            const tbody = document.getElementById('caravansTableBody');
            if (caravans.length === 0) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">لا توجد قوافل</td></tr>'; return; }
            tbody.innerHTML = '';
            caravans.forEach(caravan => {
                const status = getCaravanStatus(caravan.startDate, caravan.endDate);
                const statusText = { active: 'نشطة', upcoming: 'قادمة', ended: 'منتهية' }[status];
                const statusClass = { active: 'status-active', upcoming: 'status-upcoming', ended: 'status-ended' }[status];
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${caravan.imageUrl || 'https://via.placeholder.com/45/0e7c9e/ffffff?text=Caravan'}" style="width:45px;height:45px;border-radius:10px;object-fit:cover;"></td>
                        <td>${caravan.name || '-'}</td>
                        <td>${caravan.type === 'discount' ? 'خصومات' : 'خدمات مجانية'}</td>
                        <td>${caravan.startDate} - ${caravan.endDate}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="action-buttons">
                            <button class="action-btn" onclick="editCaravan('${caravan.id}')"><i class="fas fa-edit"></i></button>
                            <button class="action-btn delete" onclick="deleteCaravan('${caravan.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'إضافة قافلة جديدة';
            document.getElementById('caravanForm').reset();
            document.getElementById('caravanId').value = '';
            discountServices = [];
            freeServices = [];
            renderDiscountServices();
            renderFreeServices();
            document.getElementById('caravanType').value = 'discount';
            toggleTypeFields();
            document.getElementById('caravanModal').classList.add('active');
        }

        async function editCaravan(id) {
            const doc = await db.collection('caravans').doc(id).get();
            const data = doc.data();
            document.getElementById('modalTitle').textContent = 'تعديل بيانات القافلة';
            document.getElementById('caravanId').value = id;
            document.getElementById('caravanName').value = data.name || '';
            document.getElementById('caravanStartDate').value = data.startDate || '';
            document.getElementById('caravanEndDate').value = data.endDate || '';
            document.getElementById('caravanType').value = data.type || 'discount';
            document.getElementById('caravanImage').value = data.imageUrl || '';
            document.getElementById('caravanDescription').value = data.description || '';
            
            if (data.type === 'discount') {
                discountServices = data.services || [];
                freeServices = [];
            } else {
                freeServices = data.freeServices || [];
                discountServices = [];
            }
            renderDiscountServices();
            renderFreeServices();
            toggleTypeFields();
            document.getElementById('caravanModal').classList.add('active');
        }

        async function saveCaravan() {
            const id = document.getElementById('caravanId').value;
            const type = document.getElementById('caravanType').value;
            const caravanData = {
                name: document.getElementById('caravanName').value,
                startDate: document.getElementById('caravanStartDate').value,
                endDate: document.getElementById('caravanEndDate').value,
                type: type,
                imageUrl: document.getElementById('caravanImage').value,
                description: document.getElementById('caravanDescription').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            if (!caravanData.name) { showMessage('❌ الرجاء إدخال اسم القافلة', 'error'); return; }
            if (!caravanData.startDate || !caravanData.endDate) { showMessage('❌ الرجاء إدخال تاريخ البداية والنهاية', 'error'); return; }
            
            if (type === 'discount') {
                caravanData.services = discountServices.filter(s => s.name);
            } else {
                caravanData.freeServices = freeServices.filter(s => s.trim());
            }
            
            try {
                if (id) { await db.collection('caravans').doc(id).update(caravanData); showMessage('✅ تم تحديث القافلة بنجاح', 'success'); }
                else { await db.collection('caravans').add({ ...caravanData, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); showMessage('✅ تم إضافة القافلة بنجاح', 'success'); }
                closeModal();
                loadCaravans();
            } catch (error) { showMessage('❌ خطأ في الحفظ: ' + error.message, 'error'); }
        }

        async function deleteCaravan(id) {
            if (confirm('هل أنت متأكد من حذف هذه القافلة؟')) {
                await db.collection('caravans').doc(id).delete();
                showMessage('✅ تم حذف القافلة بنجاح', 'success');
                loadCaravans();
            }
        }

        function closeModal() { document.getElementById('caravanModal').classList.remove('active'); }

        // ============================================
        // مصادقة
        // ============================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            const userDoc = await db.collection('users').doc(user.uid).get();
            const userData = userDoc.data();
            if (!userData || (userData.role !== 'super_admin' && userData.role !== 'admin')) { window.location.href = 'login.html'; return; }
            document.getElementById('userName').textContent = userData.displayName || user.email;
            loadCaravans();
        });

        function logout() { auth.signOut().then(() => window.location.href = 'login.html'); }
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message ${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
