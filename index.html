<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>مركز يثرب الخيري التخصصي | قريباً</title>
    
    <!-- ===== الأمن السيبراني الشامل ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net https://apis.google.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="format-detection" content="telephone=no">
    
    <!-- ===== منع الالتقاط ===== -->
    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        img {
            pointer-events: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
    </style>
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Three.js للخلفية ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- ===== TensorFlow.js للذكاء الاصطناعي ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- ===== QR Code Generator ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- ===== html2canvas للتصوير ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --primary-light: #2a9bc2;
            --secondary: #fbbf24;
            --secondary-dark: #f59e0b;
            --secondary-light: #fde68a;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --gradient-gold: linear-gradient(145deg, #fbbf24, #fcd34d, #fde68a);
            --gradient-security: linear-gradient(145deg, #ef4444, #dc2626);
            
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.5);
            --shadow-xl: 0 30px 70px rgba(0,0,0,0.7);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            color: var(--light);
            position: relative;
            overflow-x: hidden;
            background: var(--darker);
        }

        /* ===== خلفية 3D ===== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .medical-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(5,17,24,0.3) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== الأمن السيبراني ===== */
        .security-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999999;
            pointer-events: none;
            display: none;
        }

        .security-layer.active {
            display: block;
        }

        .security-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--gradient-security);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            z-index: 999999;
            box-shadow: var(--shadow-xl);
            border: 2px solid white;
            animation: securityFade 2s forwards;
            text-align: center;
        }

        @keyframes securityFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        /* ===== شاشة الترحيب (مضمونة 100%) ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #051118, #0a1f2f, #0e7c9e);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease, visibility 1.5s ease;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-content {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        .splash-logo {
            width: min(320px, 65vw);
            height: min(320px, 65vw);
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--secondary);
            box-shadow: 0 0 50px rgba(251,191,36,0.5), 0 0 80px rgba(14,124,158,0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s ease, transform 0.3s ease;
            background: transparent;
            position: relative;
        }

        .splash-logo.loaded {
            animation: logoAppear 2s ease-out forwards;
        }

        @keyframes logoAppear {
            0% { opacity: 0; transform: scale(0.3) rotate(-15deg); }
            30% { opacity: 0.5; transform: scale(0.6) rotate(-8deg); }
            60% { opacity: 0.9; transform: scale(1.1) rotate(3deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .splash-logo-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            opacity: 1;
            transition: opacity 0.5s ease;
            border-radius: 50%;
        }

        .splash-logo-placeholder.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-title {
            color: white;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin: 20px 0 25px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .splash-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-progress-container {
            width: min(450px, 80vw);
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .splash-progress-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            overflow: hidden;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .splash-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
            border-radius: 30px;
            box-shadow: 0 0 30px var(--secondary);
        }

        .splash-percentage {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900;
            color: var(--secondary);
            margin-top: 15px;
            text-shadow: 0 0 30px var(--secondary);
        }

        .splash-percentage span {
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            color: var(--light);
            margin-right: 5px;
            opacity: 0.7;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-site {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .main-site.visible {
            opacity: 1;
            pointer-events: all;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: min(1400px, 95%);
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== أزرار التحكم ===== */
        .control-buttons {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .screenshot-btn {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            border: 2px solid var(--secondary);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
            z-index: 1001;
        }

        .screenshot-btn:hover {
            transform: scale(1.1) rotate(360deg);
            background: var(--gradient-secondary);
            color: var(--darker);
        }

        .qr-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .qr-button, .share-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
        }

        .qr-button {
            background: var(--gradient-secondary);
            color: var(--darker);
        }

        .share-btn {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--secondary);
        }

        .qr-button:hover, .share-btn:hover {
            transform: scale(1.1) rotate(360deg);
        }

        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,17,24,0.98);
            backdrop-filter: blur(30px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .qr-modal.active {
            display: flex;
        }

        .qr-modal-content {
            background: white;
            padding: 30px;
            border-radius: 50px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .qr-modal-content .qr-large {
            width: 200px;
            height: 200px;
            margin: 20px auto;
        }

        .qr-modal-content .close-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5,17,24,0.8);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 12px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(251,191,36,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--light);
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
            width: fit-content;
        }

        .contact-item:hover {
            background: var(--gradient-primary);
            transform: translateY(-3px);
        }

        .contact-item i {
            color: var(--secondary);
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: var(--gradient-secondary);
            transform: rotate(360deg);
            color: var(--darker);
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            margin: 20px 0;
        }

        .coming-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            text-align: right;
        }

        .main-title .highlight {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-title .small {
            font-size: clamp(1.3rem, 5vw, 2.5rem);
            display: block;
            color: var(--light);
        }

        .description {
            font-size: 1rem;
            color: var(--light);
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.8;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            padding: 18px 22px;
            border-radius: 30px;
        }

        /* ===== العد التنازلي ===== */
        .countdown {
            display: flex;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 15px 12px;
            min-width: 80px;
            text-align: center;
            border: 1px solid rgba(251,191,36,0.2);
            transition: all 0.3s;
            flex: 1;
            max-width: 110px;
        }

        .countdown-number {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 900;
            color: var(--secondary);
            line-height: 1;
            margin-bottom: 5px;
            text-shadow: 0 0 20px var(--secondary);
        }

        .countdown-label {
            font-size: 0.9rem;
            color: var(--light);
            opacity: 0.9;
        }

        .countdown-comment {
            margin-top: 15px;
            font-size: 1rem;
            color: var(--secondary);
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            padding: 12px 25px;
            border-radius: 50px;
            width: fit-content;
        }

        /* ===== اللوجو ===== */
        .left-section {
            display: flex;
            justify-content: center;
        }

        .logo-container {
            width: min(400px, 80vw);
            height: min(400px, 80vw);
            perspective: 2000px;
            cursor: pointer;
        }

        .logo-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4,0,0.2,1);
        }

        .logo-3d.hover-flip {
            transition: transform 0.15s;
            transform: rotateY(180deg);
        }

        .logo-3d.normal-flip {
            transform: rotateY(180deg);
        }

        .logo-3d.return-flip {
            transform: rotateY(0deg);
        }

        .logo-3d.ai-flip {
            transition: transform 0.8s cubic-bezier(0.68,-0.55,0.265,1.55);
            transform: rotateY(180deg);
        }

        .logo-3d.ai-rotate {
            transition: transform 0.6s ease;
            transform: rotateY(360deg);
        }

        .logo-3d.ai-shake {
            animation: aiShake 0.5s ease;
        }

        @keyframes aiShake {
            0%, 100% { transform: rotateY(0deg); }
            25% { transform: rotateY(90deg); }
            50% { transform: rotateY(180deg); }
            75% { transform: rotateY(90deg); }
        }

        .logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 4px var(--secondary), 0 0 70px var(--secondary);
            overflow: hidden;
        }

        .logo-front {
            transform: rotateY(0deg);
            background: transparent;
        }

        .logo-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-back {
            transform: rotateY(180deg);
            background: var(--gradient-gold);
            flex-direction: column;
            color: var(--darker);
            padding: 15px;
        }

        .logo-back i {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .logo-back span {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--darker);
            text-align: center;
        }

        /* ===== الخدمات ===== */
        .services-section {
            margin-top: 60px;
        }

        .services-title {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 40px;
        }

        .services-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--gradient-secondary);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap: 25px;
        }

        .service-card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(251,191,36,0.1);
        }

        .service-card:hover {
            transform: translateY(-15px);
            border-color: var(--secondary);
        }

        .service-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: white;
            transition: transform 0.3s;
        }

        .service-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }

        .service-comment {
            color: var(--gray);
            font-size: 0.95rem;
        }

        /* ===== الفوتر ===== */
        .footer {
            margin-top: 60px;
            padding: 25px 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--gray);
            font-size: 0.95rem;
        }

        /* ===== تحسينات الجوال ===== */
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .main-title {
                text-align: center;
            }
            .description {
                margin: 0 auto;
            }
            .countdown {
                justify-content: center;
            }
            .countdown-comment {
                margin: 15px auto 0;
            }
            .contact-info {
                align-items: center;
            }
        }

        @media (max-width: 600px) {
            .contact-item {
                width: 100%;
                justify-content: center;
            }
            .top-bar {
                flex-direction: column;
                align-items: center;
            }
            .countdown-item {
                min-width: 70px;
                padding: 12px 8px;
            }
            .logo-container {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- طبقة الأمن السيبراني -->
    <div class="security-layer" id="securityLayer"></div>

    <!-- خلفية 3D -->
    <div id="canvas-container"></div>
    <div class="medical-overlay"></div>

    <!-- أزرار التحكم -->
    <div class="control-buttons">
        <button class="screenshot-btn" onclick="captureFullPage()">
            <i class="fas fa-camera"></i>
        </button>
    </div>

    <div class="qr-container">
        <div class="qr-button" onclick="openQRModal()">
            <i class="fas fa-qrcode"></i>
        </div>
        <div class="share-btn" onclick="sharePage()">
            <i class="fas fa-share-alt"></i>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="qr-modal" id="qrModal">
        <div class="qr-modal-content">
            <h3 style="color:var(--darker)">رمز QR</h3>
            <div class="qr-large" id="qrLarge"></div>
            <button class="close-btn" onclick="closeQRModal()">إغلاق</button>
        </div>
    </div>

    <!-- شاشة الترحيب (مضمونة 100%) -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo" id="splashLogoContainer">
                <div class="splash-logo-placeholder" id="logoPlaceholder">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <img src="" alt="مركز يثرب" id="splashLogo" style="display: none;">
            </div>
            <h2 class="splash-title" id="splashTitle">مركز يثرب الخيري التخصصي</h2>
            <div class="splash-progress-container" id="splashProgressContainer">
                <div class="splash-progress">
                    <div class="splash-progress-bar" id="splashProgress"></div>
                </div>
                <div class="splash-percentage" id="splashPercentage">0<span>%</span></div>
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-site" id="mainSite">
        <div class="container">
            <div class="top-bar">
                <div class="contact-info">
                    <div class="contact-item" id="phoneDisplay" onclick="handlePhoneClick(event)">
                        <i class="fas fa-phone-alt"></i>
                        <span>...</span>
                    </div>
                    <div class="contact-item" id="addressDisplay">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>...</span>
                    </div>
                </div>
                <a href="#" class="social-link" id="facebookLink" target="_blank">
                    <i class="fab fa-facebook-f"></i>
                </a>
            </div>

            <div class="main-content">
                <div>
                    <div class="coming-badge">
                        <i class="fas fa-calendar-alt"></i> سيتم افتتاح الموقع قريباً
                    </div>
                    <h1 class="main-title">
                        <span class="highlight">مركز يثرب الخيري</span>
                        <span class="small">التخصصي</span>
                    </h1>
                    <p class="description" id="description"></p>

                    <div class="countdown" id="countdown">
                        <div class="countdown-item" id="days-item">
                            <div class="countdown-number" id="days">--</div>
                            <div class="countdown-label">يوم</div>
                        </div>
                        <div class="countdown-item" id="hours-item">
                            <div class="countdown-number" id="hours">--</div>
                            <div class="countdown-label">ساعة</div>
                        </div>
                        <div class="countdown-item" id="minutes-item">
                            <div class="countdown-number" id="minutes">--</div>
                            <div class="countdown-label">دقيقة</div>
                        </div>
                        <div class="countdown-item" id="seconds-item">
                            <div class="countdown-number" id="seconds">--</div>
                            <div class="countdown-label">ثانية</div>
                        </div>
                    </div>

                    <div class="countdown-comment" id="countdownComment"></div>
                </div>

                <div class="left-section">
                    <div class="logo-container" id="logoContainer">
                        <div class="logo-3d" id="logo3d">
                            <div class="logo-face logo-front">
                                <img src="" alt="مركز يثرب" id="mainLogo">
                            </div>
                            <div class="logo-face logo-back">
                                <i class="fas fa-heart"></i>
                                <span id="logoBackText">يثرب الخيري</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="services-section">
                <h2 class="services-title">خدماتنا</h2>
                <div class="services-grid" id="servicesGrid"></div>
            </div>

            <div class="footer">
                <i class="fas fa-code"></i> نقابة تكنولوجيا المعلومات والبرمجيات المصرية | جميع الحقوق محفوظة © ٢٠٢٦
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // الأمن السيبراني
        // ============================================
        (function() {
            document.addEventListener('contextmenu', e => { e.preventDefault(); showMsg('🚫 غير مسموح'); });
            document.addEventListener('keydown', e => {
                if (e.ctrlKey || e.metaKey) {
                    if (['c','x','u','s','p','a','v','C','X','U','S','P','A','V'].includes(e.key)) {
                        e.preventDefault(); showMsg('📸 غير مسموح');
                    }
                }
                if (e.key === 'F12' || e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.key==='I'||e.key==='J'))) {
                    e.preventDefault(); showMsg('🔒 أدوات المطور مغلقة');
                }
                if (e.key === 'PrintScreen' || e.keyCode === 44) {
                    e.preventDefault(); showMsg('📸 غير مسموح');
                }
            });
            document.addEventListener('selectstart', e => e.preventDefault());
            document.addEventListener('copy', e => { e.preventDefault(); showMsg('📋 غير مسموح'); });
            
            let devToolsOpen = false;
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() { devToolsOpen = true; showMsg('🔒 تم اكتشاف أدوات المطور'); return ''; }
            });
            
            setInterval(() => {
                devToolsOpen = false;
                console.log(element);
                if (devToolsOpen) {
                    document.body.innerHTML = '<div style="color:red; font-size:2rem; text-align:center; margin-top:50vh;">🔒 غير مصرح</div>';
                }
            }, 1000);
            
            function showMsg(msg) {
                const layer = document.getElementById('securityLayer');
                layer.innerHTML = `<div class="security-message">${msg}</div>`;
                layer.classList.add('active');
                setTimeout(() => layer.classList.remove('active'), 2000);
            }
        })();

        // ============================================
        // الذكاء الاصطناعي المتطور
        // ============================================
        class AIEngine {
            constructor() {
                this.countdownItems = [];
                this.serviceIcons = [];
                this.logo = document.getElementById('logo3d');
                this.active = true;
                this.init();
            }

            init() {
                setInterval(() => this.animateCountdown(), 1000);
                setInterval(() => this.animateServiceIcons(), 1000);
                setInterval(() => this.animateLogo(), 2000);
                setInterval(() => this.randomEffects(), 3000);
            }

            animateCountdown() {
                this.countdownItems = document.querySelectorAll('.countdown-item');
                if (this.countdownItems.length > 0) {
                    this.countdownItems.forEach(item => {
                        item.style.transform = '';
                        item.style.boxShadow = '';
                    });
                    
                    const randomIndex = Math.floor(Math.random() * this.countdownItems.length);
                    const item = this.countdownItems[randomIndex];
                    
                    item.style.transition = 'all 0.3s';
                    item.style.transform = 'translateY(-5px) scale(1.05)';
                    item.style.boxShadow = '0 0 30px var(--secondary), 0 0 60px var(--primary)';
                    item.style.borderColor = 'var(--secondary)';
                    
                    const number = item.querySelector('.countdown-number');
                    if (number) {
                        number.style.transition = 'color 0.3s';
                        number.style.color = '#fff';
                        setTimeout(() => number.style.color = '', 500);
                    }
                }
            }

            animateServiceIcons() {
                this.serviceIcons = document.querySelectorAll('.service-icon');
                if (this.serviceIcons.length > 0) {
                    this.serviceIcons.forEach(icon => {
                        icon.style.transform = '';
                        icon.style.background = '';
                    });
                    
                    const randomIndex = Math.floor(Math.random() * this.serviceIcons.length);
                    const icon = this.serviceIcons[randomIndex];
                    
                    icon.style.transition = 'all 0.4s';
                    icon.style.transform = 'rotateY(180deg) scale(1.2)';
                    icon.style.background = 'var(--gradient-secondary)';
                    
                    setTimeout(() => {
                        icon.style.transform = '';
                        icon.style.background = '';
                    }, 800);
                }
            }

            animateLogo() {
                if (!this.logo || !this.active) return;
                
                const random = Math.random();
                
                if (random < 0.3) {
                    this.logo.classList.add('ai-flip');
                    setTimeout(() => this.logo.classList.remove('ai-flip'), 800);
                } else if (random < 0.6) {
                    this.logo.classList.add('ai-rotate');
                    setTimeout(() => this.logo.classList.remove('ai-rotate'), 600);
                } else {
                    this.logo.classList.add('ai-shake');
                    setTimeout(() => this.logo.classList.remove('ai-shake'), 500);
                }
            }

            randomEffects() {
                const title = document.querySelector('.main-title .highlight');
                if (title && Math.random() > 0.5) {
                    title.style.animation = 'none';
                    title.offsetHeight;
                    title.style.animation = 'gradientFlow 3s';
                }
                
                const contactItems = document.querySelectorAll('.contact-item');
                if (contactItems.length > 0 && Math.random() > 0.7) {
                    const randomContact = contactItems[Math.floor(Math.random() * contactItems.length)];
                    randomContact.style.background = 'var(--gradient-primary)';
                    setTimeout(() => randomContact.style.background = '', 500);
                }
            }
        }

        const ai = new AIEngine();

        // ============================================
        // Firebase
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================
        // تحميل اللوجو بشكل مضمون 100%
        // ============================================
        const splashLogo = document.getElementById('splashLogo');
        const mainLogo = document.getElementById('mainLogo');
        const splashLogoContainer = document.getElementById('splashLogoContainer');
        const logoPlaceholder = document.getElementById('logoPlaceholder');
        const splashTitle = document.getElementById('splashTitle');
        const splashProgressContainer = document.getElementById('splashProgressContainer');
        
        let logoLoaded = false;
        let logoUrl = null;

        // دالة لتحميل اللوجو مع ضمان الظهور
        async function loadLogoWithGuarantee() {
            try {
                // جلب البيانات من Firebase
                const doc = await db.collection('settings').doc('comingSoon').get();
                
                if (doc.exists && doc.data().logoUrl) {
                    logoUrl = doc.data().logoUrl;
                    
                    // إنشاء كائن Image لتحميل الصورة
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    
                    img.onload = function() {
                        // الصورة تحملت بنجاح
                        splashLogo.src = logoUrl;
                        mainLogo.src = logoUrl;
                        splashLogo.style.display = 'block';
                        logoPlaceholder.classList.add('hidden');
                        splashLogoContainer.classList.add('loaded');
                        logoLoaded = true;
                        
                        // إظهار العناصر الأخرى
                        setTimeout(() => {
                            splashTitle.classList.add('visible');
                            splashProgressContainer.classList.add('visible');
                        }, 500);
                    };
                    
                    img.onerror = function() {
                        // فشل تحميل الصورة - نستخدم placeholder
                        console.log('فشل تحميل الصورة، نستخدم الأيقونة');
                        logoPlaceholder.innerHTML = '<i class="fas fa-heartbeat"></i>';
                        splashLogoContainer.classList.add('loaded');
                        logoLoaded = true;
                        
                        setTimeout(() => {
                            splashTitle.classList.add('visible');
                            splashProgressContainer.classList.add('visible');
                        }, 500);
                    };
                    
                    img.src = logoUrl;
                } else {
                    // لا يوجد رابط - نستخدم placeholder
                    logoPlaceholder.innerHTML = '<i class="fas fa-heartbeat"></i>';
                    splashLogoContainer.classList.add('loaded');
                    logoLoaded = true;
                    
                    setTimeout(() => {
                        splashTitle.classList.add('visible');
                        splashProgressContainer.classList.add('visible');
                    }, 500);
                }
            } catch (error) {
                console.log('خطأ في تحميل اللوجو:', error);
                // في حالة الخطأ، نستخدم placeholder
                logoPlaceholder.innerHTML = '<i class="fas fa-heartbeat"></i>';
                splashLogoContainer.classList.add('loaded');
                logoLoaded = true;
                
                setTimeout(() => {
                    splashTitle.classList.add('visible');
                    splashProgressContainer.classList.add('visible');
                }, 500);
            }
        }

        // بدأ تحميل اللوجو فوراً
        loadLogoWithGuarantee();

        // ============================================
        // شاشة الترحيب
        // ============================================
        const splashScreen = document.getElementById('splashScreen');
        const splashProgress = document.getElementById('splashProgress');
        const splashPercentage = document.getElementById('splashPercentage');
        const mainSite = document.getElementById('mainSite');

        // شريط التقدم البطيء (2.5 ثانية)
        let progress = 0;
        const interval = setInterval(() => {
            progress += 1.2;
            if (progress > 100) progress = 100;
            splashProgress.style.width = progress + '%';
            splashPercentage.innerHTML = Math.round(progress) + '<span>%</span>';
            
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    splashScreen.classList.add('hidden');
                    mainSite.classList.add('visible');
                    loadRealTimeData(); // بدأ الـ real-time بعد الظهور
                }, 500);
            }
        }, 35);

        // ============================================
        // Real-time Data Loading
        // ============================================
        function loadRealTimeData() {
            db.collection('settings').doc('comingSoon').onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    
                    // تحديث اسم المركز
                    document.getElementById('splashTitle').textContent = data.centerName || 'مركز يثرب الخيري التخصصي';
                    document.getElementById('logoBackText').textContent = data.centerName || 'يثرب الخيري';
                    
                    // تحديث اللوجو إذا تغير
                    if (data.logoUrl && data.logoUrl !== logoUrl) {
                        const img = new Image();
                        img.onload = function() {
                            document.getElementById('mainLogo').src = data.logoUrl;
                            if (!logoLoaded) {
                                document.getElementById('splashLogo').src = data.logoUrl;
                            }
                        };
                        img.src = data.logoUrl;
                    }
                    
                    // تحديث باقي البيانات
                    if (data.phone) {
                        document.querySelector('#phoneDisplay span').textContent = data.phone;
                    }
                    
                    if (data.address) {
                        document.querySelector('#addressDisplay span').textContent = data.address;
                    }
                    
                    if (data.facebook) {
                        document.getElementById('facebookLink').href = data.facebook;
                    }
                    
                    if (data.description) {
                        document.getElementById('description').textContent = data.description;
                    }
                    
                    if (data.comment) {
                        document.getElementById('countdownComment').textContent = data.comment;
                    }
                    
                    if (data.completionDate) {
                        const target = new Date(data.completionDate + 'T' + (data.deliveryTime || '12:00'));
                        updateCountdown(target);
                    }
                    
                    if (data.services) {
                        const grid = document.getElementById('servicesGrid');
                        grid.innerHTML = '';
                        data.services.forEach(s => {
                            const card = document.createElement('div');
                            card.className = 'service-card';
                            card.innerHTML = `
                                <div class="service-icon"><i class="fas ${s.icon || 'fa-stethoscope'}"></i></div>
                                <div class="service-name">${s.name}</div>
                                <div class="service-comment">${s.comment}</div>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
            });
        }

        // تحديث العد التنازلي
        function updateCountdown(target) {
            setInterval(() => {
                const now = new Date();
                const diff = target - now;
                
                if (diff > 0) {
                    const d = Math.floor(diff / (1000*60*60*24));
                    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                    const s = Math.floor((diff % (1000*60)) / 1000);
                    
                    document.getElementById('days').textContent = d.toString().padStart(2,'0');
                    document.getElementById('hours').textContent = h.toString().padStart(2,'0');
                    document.getElementById('minutes').textContent = m.toString().padStart(2,'0');
                    document.getElementById('seconds').textContent = s.toString().padStart(2,'0');
                }
            }, 1000);
        }

        // ============================================
        // تصوير الشاشة
        // ============================================
        function captureFullPage() {
            showMsg('📸 جاري التصوير...');
            html2canvas(document.body, {
                scale: 2,
                backgroundColor: null,
                useCORS: true,
                width: document.documentElement.scrollWidth,
                height: document.documentElement.scrollHeight
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'yathreb.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showMsg('✅ تم التصوير');
            }).catch(() => showMsg('❌ فشل التصوير'));
        }

        // ============================================
        // QR Code
        // ============================================
        function openQRModal() {
            document.getElementById('qrModal').classList.add('active');
            document.getElementById('qrLarge').innerHTML = '';
            new QRCode(document.getElementById("qrLarge"), {
                text: window.location.href,
                width: 200,
                height: 200,
                colorDark: "#0e7c9e"
            });
        }

        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }

        function sharePage() {
            if (navigator.share) {
                navigator.share({ title: 'مركز يثرب', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showMsg('✅ تم نسخ الرابط');
            }
        }

        // ============================================
        // معالجة رقم التليفون
        // ============================================
        function handlePhoneClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const phoneSpan = document.querySelector('#phoneDisplay span');
            const phone = phoneSpan.textContent;
            const cleanPhone = phone.replace(/[^0-9+]/g, '');
            
            const choice = confirm('اضغط OK لفتح واتساب\nاضغط Cancel للاتصال المباشر');
            
            if (choice) {
                const whatsappUrl = `https://wa.me/${cleanPhone}`;
                window.open(whatsappUrl, '_blank');
            } else {
                window.location.href = `tel:${cleanPhone}`;
            }
        }

        // ============================================
        // خلفية 3D
        // ============================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1f2f);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const count = 1500;
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i += 3) {
            pos[i] = (Math.random() - 0.5) * 30;
            pos[i+1] = (Math.random() - 0.5) * 30;
            pos[i+2] = (Math.random() - 0.5) * 30;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0x0e7c9e, size: 0.1, transparent: true, opacity: 0.3 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);

        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // حركات اللوجو الأساسية
        // ============================================
        const logoContainer = document.getElementById('logoContainer');
        const logo3d = document.getElementById('logo3d');
        let isFlipped = false;

        setInterval(() => {
            if (!isFlipped) {
                logo3d.classList.add('normal-flip');
                isFlipped = true;
                setTimeout(() => {
                    logo3d.classList.remove('normal-flip');
                    logo3d.classList.add('return-flip');
                    setTimeout(() => {
                        logo3d.classList.remove('return-flip');
                        isFlipped = false;
                    }, 1200);
                }, 1200);
            }
        }, 5000);

        logoContainer.addEventListener('mouseenter', () => {
            if (!isFlipped) {
                logo3d.classList.add('hover-flip');
                setTimeout(() => logo3d.classList.remove('hover-flip'), 150);
            }
        });

        logoContainer.addEventListener('click', () => {
            if (isFlipped) {
                logo3d.classList.add('return-flip');
                setTimeout(() => logo3d.classList.remove('return-flip'), 1200);
            } else {
                logo3d.classList.add('normal-flip');
                setTimeout(() => logo3d.classList.remove('normal-flip'), 1200);
            }
            isFlipped = !isFlipped;
        });
    </script>
</body>
</html>
