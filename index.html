<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مركز يثرب الخيري التخصصي | قريباً</title>
    
    <!-- ===== الأمان السيبراني ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Three.js للخلفية الطبية ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET متقدم ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --primary-light: #1a9bc2;
            --secondary: #fbbf24;
            --accent: #10b981;
            --dark: #0a1a2f;
            --light: #f8fafc;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, var(--primary), var(--primary-dark));
            --gradient-secondary: linear-gradient(145deg, var(--secondary), #f59e0b);
            --gradient-medical: linear-gradient(145deg, #0a1a2f, #1a4b6d, #0e7c9e);
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            color: var(--light);
            position: relative;
            overflow-x: hidden;
            background: var(--dark);
        }

        /* ===== شاشة الترحيب ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-medical);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease, visibility 1.5s;
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-content {
            text-align: center;
            max-width: 800px;
            padding: 30px;
        }

        .splash-logo {
            width: 350px;
            height: 350px;
            margin: 0 auto 40px;
            position: relative;
            perspective: 2500px;
        }

        .splash-logo-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: splashRotate 2.5s ease-out forwards;
        }

        @keyframes splashRotate {
            0% { transform: rotateY(0deg) scale(0.8); opacity: 0; }
            30% { transform: rotateY(180deg) scale(1); opacity: 1; }
            60% { transform: rotateY(360deg) scale(1); }
            100% { transform: rotateY(720deg) scale(1); }
        }

        .splash-logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 4px var(--secondary), 0 0 50px var(--secondary);
            overflow: hidden;
            background: var(--gradient-primary);
        }

        .splash-logo-front {
            transform: rotateY(0deg);
            padding: 25px;
        }

        .splash-logo-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .splash-logo-back {
            transform: rotateY(180deg);
            background: var(--gradient-secondary);
            flex-direction: column;
            color: var(--dark);
        }

        .splash-logo-back i {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: heartbeat 2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .splash-logo-back span {
            font-size: 2.5rem;
            font-weight: 900;
            background: rgba(0,0,0,0.3);
            padding: 10px 30px;
            border-radius: 50px;
            color: white;
        }

        .splash-title {
            color: white;
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px var(--primary), 0 0 40px var(--secondary);
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .splash-progress {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .splash-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
            box-shadow: 0 0 30px var(--secondary);
        }

        .splash-percentage {
            font-size: 3rem;
            font-weight: 900;
            color: var(--secondary);
            margin-top: 20px;
        }

        /* ===== خلفية طبية 3D ===== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-site {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .main-site.visible {
            opacity: 1;
            pointer-events: all;
        }

        .content-overlay {
            position: relative;
            z-index: 20;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(10, 26, 47, 0.2);
            backdrop-filter: blur(3px);
        }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(10, 26, 47, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--light);
            font-size: 1.1rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
        }

        .contact-item i {
            color: var(--secondary);
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: 1.2rem;
            transition: all 0.3s;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .social-link:hover {
            background: var(--secondary);
            color: var(--dark);
            transform: rotate(360deg);
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            margin: 40px 0;
        }

        .coming-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(14,124,158,0.4);
        }

        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .main-title .highlight {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-title .small {
            font-size: 2.5rem;
            display: block;
            color: var(--light);
            opacity: 0.9;
        }

        .description {
            font-size: 1.3rem;
            color: var(--light);
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.8;
            background: rgba(0,0,0,0.2);
            padding: 20px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== العد التنازلي ===== */
        .countdown {
            display: flex;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px 20px;
            min-width: 120px;
            text-align: center;
            border: 1px solid rgba(251,191,36,0.3);
            transition: all 0.3s;
        }

        .countdown-item:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px rgba(251,191,36,0.2);
        }

        .countdown-number {
            font-size: 4rem;
            font-weight: 900;
            color: var(--secondary);
            line-height: 1;
            margin-bottom: 5px;
        }

        .countdown-label {
            font-size: 1.2rem;
            color: var(--light);
            opacity: 0.8;
        }

        .countdown-comment {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--secondary);
            text-align: center;
            background: rgba(251,191,36,0.1);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(251,191,36,0.3);
            backdrop-filter: blur(10px);
            width: fit-content;
        }

        /* ===== اللوجو ===== */
        .left-section {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            width: 500px;
            height: 500px;
            position: relative;
            perspective: 2000px;
            cursor: pointer;
        }

        .logo-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
        }

        .logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 3px var(--secondary), 0 0 50px var(--secondary);
            overflow: hidden;
        }

        .logo-front {
            transform: rotateY(0deg);
            background: var(--gradient-primary);
            padding: 20px;
        }

        .logo-front img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-back {
            transform: rotateY(180deg);
            background: var(--gradient-secondary);
            flex-direction: column;
            color: var(--dark);
        }

        .logo-back i {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: heartbeat 2s infinite;
        }

        .logo-back span {
            font-size: 2rem;
            font-weight: 900;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            text-align: center;
        }

        /* ===== الخدمات ===== */
        .services-section {
            margin-top: 80px;
        }

        .services-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .services-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: var(--secondary);
            border-radius: 3px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .service-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 25px;
            text-align: center;
            transition: all 0.4s;
            border: 1px solid rgba(251,191,36,0.2);
        }

        .service-card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: var(--secondary);
            box-shadow: 0 30px 50px rgba(251,191,36,0.2);
        }

        .service-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-primary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 3.5rem;
            color: white;
            transition: all 0.4s;
        }

        .service-card:hover .service-icon {
            transform: rotateY(180deg);
            background: var(--gradient-secondary);
        }

        .service-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        .service-comment {
            color: var(--gray);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* ===== الفوتر ===== */
        .footer {
            margin-top: 80px;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--gray);
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .footer span {
            color: var(--secondary);
            font-weight: 700;
        }

        /* ===== مؤشر التحميل ===== */
        .loading-data {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            color: var(--light);
            font-size: 0.9rem;
            border: 1px solid var(--secondary);
            z-index: 1000;
            display: none;
        }

        .loading-data.visible {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--secondary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== استجابة ===== */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .main-title { font-size: 3.5rem; }
            .description { margin: 0 auto; }
            .countdown { justify-content: center; }
            .countdown-comment { margin: 20px auto 0; }
            .logo-container { width: 400px; height: 400px; margin: 0 auto; }
            .splash-logo { width: 250px; height: 250px; }
        }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; }
            .main-title { font-size: 2.8rem; }
            .main-title .small { font-size: 2rem; }
            .logo-container { width: 300px; height: 300px; }
            .splash-logo { width: 200px; height: 200px; }
            .countdown-item { min-width: 90px; padding: 20px; }
            .countdown-number { font-size: 3rem; }
        }

        @media (max-width: 480px) {
            .logo-container { width: 250px; height: 250px; }
            .splash-logo { width: 150px; height: 150px; }
            .countdown-item { min-width: 70px; padding: 15px; }
            .countdown-number { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <!-- شاشة الترحيب -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">
                <div class="splash-logo-3d" id="splashLogo">
                    <div class="splash-logo-face splash-logo-front">
                        <img src="" alt="مركز يثرب الخيري التخصصي" id="splashLogoImg">
                    </div>
                    <div class="splash-logo-face splash-logo-back">
                        <i class="fas fa-heartbeat"></i>
                        <span id="splashLogoText">يثرب الخيري</span>
                    </div>
                </div>
            </div>
            <h2 class="splash-title" id="splashTitle">مركز يثرب الخيري التخصصي</h2>
            <div class="splash-progress">
                <div class="splash-progress-bar" id="splashProgress"></div>
            </div>
            <div class="splash-percentage" id="splashPercentage">0%</div>
        </div>
    </div>

    <!-- خلفية طبية 3D -->
    <div id="canvas-container"></div>

    <!-- مؤشر تحميل البيانات -->
    <div class="loading-data" id="loadingData">
        <div class="loading-spinner"></div>
        <span>جاري تحميل البيانات...</span>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-site" id="mainSite">
        <div class="content-overlay">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <div class="contact-info">
                    <div class="contact-item" id="phoneDisplay">
                        <i class="fas fa-phone-alt"></i>
                        <span>...</span>
                    </div>
                    <div class="contact-item" id="addressDisplay">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>...</span>
                    </div>
                </div>
                <div class="social-links">
                    <a href="#" class="social-link" id="facebookLink" target="_blank" rel="noopener noreferrer">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
            </div>

            <!-- المحتوى الرئيسي -->
            <div class="main-content">
                <div class="right-section">
                    <div class="coming-badge">
                        <i class="fas fa-calendar-alt"></i> سيتم الموقع قريباً
                    </div>
                    
                    <h1 class="main-title">
                        <span class="highlight">مركز يثرب الخيري</span>
                        <span class="small">التخصصي</span>
                    </h1>
                    
                    <p class="description" id="description">
                        صرح طبي متكامل يقدم خدمات صحية متميزة بمعايير عالية وكوادر بشرية متخصصة
                    </p>

                    <!-- العد التنازلي -->
                    <div class="countdown" id="countdown">
                        <div class="countdown-item">
                            <div class="countdown-number" id="days">--</div>
                            <div class="countdown-label">يوم</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="hours">--</div>
                            <div class="countdown-label">ساعة</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="minutes">--</div>
                            <div class="countdown-label">دقيقة</div>
                        </div>
                        <div class="countdown-item">
                            <div class="countdown-number" id="seconds">--</div>
                            <div class="countdown-label">ثانية</div>
                        </div>
                    </div>

                    <div class="countdown-comment" id="countdownComment"></div>
                </div>

                <div class="left-section">
                    <!-- اللوجو ثلاثي الأبعاد -->
                    <div class="logo-container" id="logoContainer">
                        <div class="logo-3d" id="logo3d">
                            <div class="logo-face logo-front">
                                <img src="" alt="مركز يثرب الخيري التخصصي" id="mainLogo">
                            </div>
                            <div class="logo-face logo-back">
                                <i class="fas fa-heart"></i>
                                <span id="logoBackText">يثرب الخيري</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- الخدمات -->
            <div class="services-section">
                <h2 class="services-title">خدماتنا</h2>
                <div class="services-grid" id="servicesGrid">
                    <!-- الخدمات هتتحمل من Firebase -->
                </div>
            </div>

            <!-- الفوتر -->
            <div class="footer">
                <i class="fas fa-code"></i> تصميم وتطوير <span>BASHA</span> | جميع الحقوق محفوظة © ٢٠٢٦
            </div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909",
            storageBucket: "yathreb-10909.firebasestorage.app",
            messagingSenderId: "525635197745",
            appId: "1:525635197745:web:99e1cbab31693af790ae10"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ===== شاشة الترحيب =====
        const splashScreen = document.getElementById('splashScreen');
        const splashProgress = document.getElementById('splashProgress');
        const splashPercentage = document.getElementById('splashPercentage');
        const mainSite = document.getElementById('mainSite');
        const loadingData = document.getElementById('loadingData');
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += 1;
            splashProgress.style.width = progress + '%';
            splashPercentage.textContent = progress + '%';
            
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    splashScreen.classList.add('hidden');
                    mainSite.classList.add('visible');
                }, 500);
            }
        }, 25);

        // ===== خلفية طبية 3D =====
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a2f);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // إضاءة
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const pointLight1 = new THREE.PointLight(0x0e7c9e, 1, 20);
        pointLight1.position.set(2, 3, 4);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xfbbf24, 1, 20);
        pointLight2.position.set(-3, -1, 2);
        scene.add(pointLight2);

        // جسيمات طبية
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 30;
            posArray[i+1] = (Math.random() - 0.5) * 30;
            posArray[i+2] = (Math.random() - 0.5) * 30;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: 0x0e7c9e,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // حلقة طبية
        const ringGeometry = new THREE.TorusGeometry(5, 0.1, 16, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xfbbf24, emissive: 0xd97706, transparent: true, opacity: 0.2 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        camera.position.z = 15;

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            
            particlesMesh.rotation.y += 0.0005;
            particlesMesh.rotation.x += 0.0003;
            
            ring.rotation.z += 0.002;
            
            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== تحويل الأرقام للعربية =====
        function toArabicNumbers(text) {
            const arabicNumbers = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
            return text.toString().replace(/[0-9]/g, function(d) {
                return arabicNumbers[d];
            });
        }

        // ===== تحديث العد التنازلي =====
        function updateCountdown(targetDate) {
            const now = new Date();
            const target = new Date(targetDate);
            const diff = target - now;
            
            if (diff <= 0) {
                document.getElementById('days').textContent = '٠٠';
                document.getElementById('hours').textContent = '٠٠';
                document.getElementById('minutes').textContent = '٠٠';
                document.getElementById('seconds').textContent = '٠٠';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = toArabicNumbers(days);
            document.getElementById('hours').textContent = toArabicNumbers(hours);
            document.getElementById('minutes').textContent = toArabicNumbers(minutes);
            document.getElementById('seconds').textContent = toArabicNumbers(seconds);
        }

        // ===== تحميل البيانات من Firebase =====
        async function loadData() {
            loadingData.classList.add('visible');
            
            try {
                const doc = await db.collection('settings').doc('comingSoon').get();
                
                if (doc.exists) {
                    const data = doc.data();
                    
                    // اسم المركز
                    const centerName = data.centerName || 'مركز يثرب الخيري التخصصي';
                    document.getElementById('splashTitle').textContent = centerName;
                    
                    // تحديث نص اللوجو الخلفي
                    document.getElementById('splashLogoText').textContent = centerName;
                    document.getElementById('logoBackText').textContent = centerName;
                    
                    // اللوجو
                    if (data.logoUrl) {
                        document.getElementById('splashLogoImg').src = data.logoUrl;
                        document.getElementById('mainLogo').src = data.logoUrl;
                    }
                    
                    // رقم التليفون
                    if (data.phone) {
                        document.querySelector('#phoneDisplay span').textContent = data.phone;
                    }
                    
                    // العنوان
                    if (data.address) {
                        document.querySelector('#addressDisplay span').textContent = data.address;
                    }
                    
                    // فيسبوك
                    if (data.facebook) {
                        document.getElementById('facebookLink').href = data.facebook;
                    }
                    
                    // الوصف
                    if (data.description) {
                        document.getElementById('description').textContent = data.description;
                    }
                    
                    // الكومنت
                    if (data.comment) {
                        document.getElementById('countdownComment').textContent = data.comment;
                    }
                    
                    // العد التنازلي
                    if (data.completionDate) {
                        const targetDate = data.completionDate + 'T' + (data.deliveryTime || '12:00') + ':00';
                        updateCountdown(targetDate);
                        setInterval(() => updateCountdown(targetDate), 1000);
                    }
                    
                    // الخدمات
                    if (data.services && data.services.length > 0) {
                        const servicesGrid = document.getElementById('servicesGrid');
                        servicesGrid.innerHTML = '';
                        
                        data.services.forEach(service => {
                            const card = document.createElement('div');
                            card.className = 'service-card';
                            card.innerHTML = `
                                <div class="service-icon">
                                    <i class="fas ${service.icon || 'fa-stethoscope'}"></i>
                                </div>
                                <div class="service-name">${service.name || 'خدمة'}</div>
                                <div class="service-comment">${service.comment || ''}</div>
                            `;
                            servicesGrid.appendChild(card);
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading data:', error);
            } finally {
                loadingData.classList.remove('visible');
            }
        }

        // تحميل البيانات بعد 2 ثانية
        setTimeout(loadData, 2000);

        // ===== تأثيرات اللوجو =====
        const logoContainer = document.getElementById('logoContainer');
        const logo3d = document.getElementById('logo3d');

        logoContainer.addEventListener('mouseenter', () => {
            logo3d.style.transform = 'rotateY(180deg)';
        });

        logoContainer.addEventListener('mouseleave', () => {
            logo3d.style.transform = 'rotateY(0deg)';
        });

        logoContainer.addEventListener('click', () => {
            logo3d.style.transform = 'rotateY(360deg)';
            setTimeout(() => {
                logo3d.style.transform = 'rotateY(0deg)';
            }, 800);
        });
    </script>
</body>
</html>
