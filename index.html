<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مركز يثرب الخيري التخصصي</title>
    
    <!-- ===== الأمن السيبراني الشامل ===== -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://firestore.googleapis.com https://*.gstatic.com;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    ">
    
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="format-detection" content="telephone=no">
    
    <!-- ===== Fonts & Icons ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ===== Three.js للخلفية الطبية ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- ===== Firebase SDK ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0e7c9e;
            --primary-dark: #0a5d7a;
            --primary-light: #2a9bc2;
            --secondary: #fbbf24;
            --secondary-dark: #f59e0b;
            --accent: #10b981;
            --light: #f8fafc;
            --dark: #0a1f2f;
            --darker: #051118;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            --gradient-secondary: linear-gradient(145deg, #fbbf24, #f59e0b);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(251,191,36,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            color: var(--light);
            position: relative;
            overflow-x: hidden;
            background: var(--darker);
        }

        /* ===== خلفية طبية 3D ===== */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .medical-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(5,17,24,0.4) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-site {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .main-site.visible {
            opacity: 1;
            pointer-events: all;
        }

        .container {
            position: relative;
            z-index: 20;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== الشريط العلوي ===== */
        .top-bar {
            background: rgba(5, 17, 24, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            gap: 15px;
        }

        .contact-info {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--light);
            font-size: 1.1rem;
            padding: 8px 20px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s;
        }

        .contact-item:hover {
            background: var(--gradient-primary);
            transform: translateY(-3px);
        }

        .contact-item i {
            color: var(--secondary);
        }

        .social-links {
            display: flex;
            gap: 15px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--light);
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: var(--gradient-secondary);
            transform: rotate(360deg);
            color: var(--darker);
        }

        /* ===== الهيرو ===== */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            margin: 40px 0;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-content .highlight {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--gray);
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--secondary);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        .btn-outline {
            background: transparent;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid var(--secondary);
            transition: all 0.3s;
        }

        .btn-outline:hover {
            background: var(--gradient-secondary);
            color: var(--darker);
            transform: translateY(-3px);
        }

        .hero-image {
            display: flex;
            justify-content: center;
        }

        .hero-logo {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--secondary);
            box-shadow: var(--shadow-glow);
            background: white;
        }

        .hero-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== الأقسام ===== */
        .section {
            margin: 80px 0;
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--gradient-secondary);
            border-radius: 4px;
        }

        /* ===== الخدمات ===== */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 25px;
            text-align: center;
            transition: all 0.4s;
            border: 1px solid rgba(251,191,36,0.1);
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-20px);
            border-color: var(--secondary);
            box-shadow: 0 30px 50px rgba(251,191,36,0.2);
        }

        .service-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-primary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 3.5rem;
            color: white;
            transition: all 0.4s;
        }

        .service-card:hover .service-icon {
            transform: rotateY(180deg);
            background: var(--gradient-secondary);
        }

        .service-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        .service-desc {
            color: var(--gray);
            font-size: 1rem;
            line-height: 1.6;
        }

        /* ===== مجلس الإدارة ===== */
        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .board-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            transition: all 0.4s;
            cursor: pointer;
        }

        .board-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
        }

        .board-image {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--secondary);
        }

        .board-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .board-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 5px;
        }

        .board-position {
            color: var(--secondary);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .board-message-btn {
            background: transparent;
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .board-message-btn:hover {
            background: var(--gradient-secondary);
            color: var(--darker);
        }

        /* ===== القوافل ===== */
        .caravans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .caravan-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            transition: all 0.4s;
        }

        .caravan-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
        }

        .caravan-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .caravan-date {
            color: var(--gray);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .caravan-discount {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.9rem;
        }

        /* ===== الفوتر ===== */
        .footer {
            margin-top: 80px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            color: var(--gray);
        }

        .footer span {
            color: var(--secondary);
        }

        /* ===== مودال الكلمة ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark);
            border-radius: 40px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border: 2px solid var(--secondary);
            text-align: center;
        }

        .modal-content h3 {
            color: var(--secondary);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: var(--light);
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .modal-close {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* ===== استجابة ===== */
        @media (max-width: 1024px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 30px;
            }
            .hero-buttons {
                justify-content: center;
            }
            .hero-logo {
                width: 300px;
                height: 300px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية طبية 3D -->
    <div id="canvas-container"></div>
    <div class="medical-overlay"></div>

    <!-- المحتوى الرئيسي -->
    <div class="main-site" id="mainSite">
        <div class="container">
            <!-- الشريط العلوي -->
            <div class="top-bar">
                <div class="contact-info">
                    <div class="contact-item" id="phoneDisplay" onclick="handlePhoneClick()">
                        <i class="fas fa-phone-alt"></i>
                        <span>...</span>
                    </div>
                    <div class="contact-item" id="addressDisplay">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>...</span>
                    </div>
                </div>
                <div class="social-links">
                    <a href="#" class="social-link" id="facebookLink" target="_blank">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                </div>
            </div>

            <!-- الهيرو -->
            <div class="hero">
                <div class="hero-content">
                    <h1>
                        <span class="highlight">مركز يثرب الخيري</span><br>
                        التخصصي
                    </h1>
                    <p id="description">صرح طبي متكامل يقدم خدمات صحية متميزة بمعايير عالية وكوادر بشرية متخصصة</p>
                    <div class="hero-buttons">
                        <a href="clinic/index.html" class="btn-primary">
                            <i class="fas fa-stethoscope"></i> العيادات
                        </a>
                        <a href="lab/index.html" class="btn-primary">
                            <i class="fas fa-flask"></i> المعمل
                        </a>
                        <a href="caravans/index.html" class="btn-outline">
                            <i class="fas fa-truck-medical"></i> القوافل
                        </a>
                    </div>
                </div>
                <div class="hero-image">
                    <div class="hero-logo">
                        <img src="" alt="مركز يثرب" id="centerLogo">
                    </div>
                </div>
            </div>

            <!-- الخدمات -->
            <div class="section">
                <h2 class="section-title">خدماتنا</h2>
                <div class="services-grid" id="servicesGrid">
                    <!-- الخدمات من Firebase -->
                </div>
            </div>

            <!-- مجلس الإدارة -->
            <div class="section">
                <h2 class="section-title">مجلس الإدارة</h2>
                <div class="board-grid" id="boardGrid">
                    <!-- أعضاء مجلس الإدارة من Firebase -->
                </div>
            </div>

            <!-- القوافل -->
            <div class="section">
                <h2 class="section-title">القوافل الخيرية</h2>
                <div class="caravans-grid" id="caravansGrid">
                    <!-- القوافل النشطة من Firebase -->
                </div>
            </div>

            <!-- الفوتر -->
            <div class="footer">
                <i class="fas fa-code"></i> نقابة تكنولوجيا المعلومات والبرمجيات المصرية | جميع الحقوق محفوظة © ٢٠٢٦
            </div>
        </div>
    </div>

    <!-- مودال عرض الكلمة -->
    <div class="modal" id="messageModal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <button class="modal-close" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        // ============================================
        // تهيئة Firebase
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================
        // خلفية 3D طبية
        // ============================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1f2f);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // جسيمات طبية
        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 30;
            posArray[i+1] = (Math.random() - 0.5) * 30;
            posArray[i+2] = (Math.random() - 0.5) * 30;
        }
        
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ color: 0x0e7c9e, size: 0.1, transparent: true, opacity: 0.3 });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================
        // تحميل البيانات
        // ============================================
        const mainSite = document.getElementById('mainSite');

        async function loadData() {
            try {
                // جلب الإعدادات العامة
                const settingsDoc = await db.collection('settings').doc('comingSoon').get();
                if (settingsDoc.exists) {
                    const data = settingsDoc.data();
                    
                    if (data.centerName) {
                        document.querySelector('.hero-content h1 .highlight').textContent = data.centerName;
                    }
                    if (data.description) {
                        document.getElementById('description').textContent = data.description;
                    }
                    if (data.logoUrl) {
                        document.getElementById('centerLogo').src = data.logoUrl;
                    }
                    if (data.phone) {
                        document.querySelector('#phoneDisplay span').textContent = data.phone;
                    }
                    if (data.address) {
                        document.querySelector('#addressDisplay span').textContent = data.address;
                    }
                    if (data.facebook) {
                        document.getElementById('facebookLink').href = data.facebook;
                    }
                    
                    // الخدمات
                    if (data.services && data.services.length > 0) {
                        const servicesGrid = document.getElementById('servicesGrid');
                        servicesGrid.innerHTML = '';
                        
                        data.services.forEach(service => {
                            const card = document.createElement('div');
                            card.className = 'service-card';
                            card.onclick = () => {
                                window.location.href = service.link || '#';
                            };
                            card.innerHTML = `
                                <div class="service-icon">
                                    <i class="fas ${service.icon || 'fa-stethoscope'}"></i>
                                </div>
                                <div class="service-name">${service.name || 'خدمة'}</div>
                                <div class="service-desc">${service.comment || ''}</div>
                            `;
                            servicesGrid.appendChild(card);
                        });
                    }
                }

                // جلب أعضاء مجلس الإدارة
                const boardSnapshot = await db.collection('boardMembers')
                    .where('showInHome', '==', true)
                    .orderBy('order')
                    .get();
                
                const boardGrid = document.getElementById('boardGrid');
                if (!boardSnapshot.empty) {
                    boardGrid.innerHTML = '';
                    boardSnapshot.forEach(doc => {
                        const member = doc.data();
                        const card = document.createElement('div');
                        card.className = 'board-card';
                        card.innerHTML = `
                            <div class="board-image">
                                <img src="${member.imageUrl || 'https://via.placeholder.com/150/0e7c9e/ffffff?text=Board'}" alt="${member.name}">
                            </div>
                            <div class="board-name">${member.name}</div>
                            <div class="board-position">${member.position}</div>
                            <button class="board-message-btn" onclick="showMessage('${member.name}', '${member.message?.replace(/'/g, "\\'") || 'لا توجد كلمة بعد'}')">
                                <i class="fas fa-envelope"></i> اقرأ الكلمة
                            </button>
                        `;
                        boardGrid.appendChild(card);
                    });
                } else {
                    boardGrid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">جاري إضافة أعضاء مجلس الإدارة قريباً</p>';
                }

                // جلب القوافل النشطة
                const caravansSnapshot = await db.collection('caravans')
                    .where('status', '==', 'active')
                    .orderBy('startDate')
                    .limit(3)
                    .get();
                
                const caravansGrid = document.getElementById('caravansGrid');
                if (!caravansSnapshot.empty) {
                    caravansGrid.innerHTML = '';
                    caravansSnapshot.forEach(doc => {
                        const caravan = doc.data();
                        const card = document.createElement('div');
                        card.className = 'caravan-card';
                        card.onclick = () => {
                            window.location.href = `caravans/caravan.html?id=${doc.id}`;
                        };
                        card.innerHTML = `
                            <div class="caravan-name">${caravan.name}</div>
                            <div class="caravan-date">
                                <i class="fas fa-calendar-alt"></i>
                                <span>${caravan.startDate} - ${caravan.endDate}</span>
                            </div>
                            <div class="caravan-discount">
                                <i class="fas fa-percent"></i> خصم ${caravan.discount || '30'}%
                            </div>
                            <p style="margin-top: 15px; color: var(--gray);">${caravan.description || ''}</p>
                        `;
                        caravansGrid.appendChild(card);
                    });
                } else {
                    caravansGrid.innerHTML = '<p style="text-align:center; grid-column:1/-1;">لا توجد قوافل حالياً</p>';
                }

                mainSite.classList.add('visible');

            } catch (error) {
                console.error('Error loading data:', error);
                mainSite.classList.add('visible');
            }
        }

        // ============================================
        // دوال مساعدة
        // ============================================
        function handlePhoneClick() {
            const phone = document.querySelector('#phoneDisplay span').textContent;
            const cleanPhone = phone.replace(/[^0-9+]/g, '');
            
            const choice = confirm('اضغط OK لفتح واتساب\nاضغط Cancel للاتصال المباشر');
            
            if (choice) {
                window.open(`https://wa.me/${cleanPhone}`, '_blank');
            } else {
                window.location.href = `tel:${cleanPhone}`;
            }
        }

        function showMessage(name, message) {
            document.getElementById('modalTitle').textContent = `كلمة ${name}`;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('messageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('messageModal').classList.remove('active');
        }

        // بدأ التحميل
        loadData();
    </script>
</body>
</html>
