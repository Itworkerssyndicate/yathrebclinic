<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATHREB SETUP | إعدادات يثرب</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Three.js للـ 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* نفس التصميم الرهيب اللي فات */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #0a0f1e;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, #0a0f1e 80%);
            z-index: 1;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .setup-card {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 50px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5),
                        0 0 0 2px rgba(14, 165, 233, 0.2),
                        0 0 50px rgba(14, 165, 233, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: cardFloat 6s infinite ease-in-out;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo-3d {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
            transform-style: preserve-3d;
            animation: logoSpin 10s infinite linear;
        }

        @keyframes logoSpin {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.2);
            transform: translateZ(20px);
        }

        .header h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(14,124,158,0.4);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .form-item {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        .form-item:hover {
            transform: translateZ(20px) translateY(-5px);
        }

        .form-item.full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 1.1em;
        }

        .form-label i {
            color: #0e7c9e;
            margin-left: 8px;
        }

        .form-input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #0e7c9e;
            box-shadow: 0 0 30px rgba(14,124,158,0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.8em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            transform-style: preserve-3d;
        }

        .submit-btn:hover {
            transform: translateZ(30px) translateY(-5px);
            box-shadow: 0 30px 50px rgba(14,124,158,0.5);
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            font-size: 1.2em;
            display: none;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
            display: block;
        }

        .status-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            display: block;
        }

        .designer-signature {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .signature-name {
            font-size: 2.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #0e7c9e, #0a5d7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    <div class="particle-overlay"></div>

    <!-- المحتوى الرئيسي -->
    <div class="content">
        <div class="setup-card">
            <div class="header">
                <div class="logo-3d">
                    <div class="logo-circle">
                        <i class="fas fa-caduceus"></i>
                    </div>
                </div>
                <h1>YATHREB SETUP</h1>
                <div class="badge">
                    <i class="fas fa-database"></i> حفظ مباشر على Firebase
                </div>
            </div>

            <!-- الفورم -->
            <form id="setupForm">
                <div class="form-grid">
                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-calendar"></i>
                            تاريخ الانتهاء
                        </label>
                        <input type="date" class="form-input" id="completionDate" value="2026-01-01" required>
                    </div>

                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-clock"></i>
                            وقت التسليم
                        </label>
                        <input type="time" class="form-input" id="deliveryTime" value="12:00" required>
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fas fa-link"></i>
                            رابط اللوجو (المركز)
                        </label>
                        <input type="url" class="form-input" id="centerLogoUrl" 
                               value="https://scontent.faly2-2.fna.fbcdn.net/v/t39.30808-6/476472762_1187938009650859_5208399285481594262_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=Jj3_P2SMrOIQ7kNvwE07p-l&_nc_oc=AdlxfEKMUf4mnTe1QvbSWdKzzFzkHX9DrlfuxIBwrVbOtowui5H3X5kZGIM6f9dB_Gc&_nc_zt=23&_nc_ht=scontent.faly2-2.fna&_nc_gid=MkEyGIJBMhR04y8s7i9okw&_nc_ss=8&oh=00_AfzbUeCF4Nf5C4B9CIFr5C0w66qD471ZiPQ-X3O90N2NEA&oe=69BDEAF7"
                               placeholder="رابط لوجو المركز" required>
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fas fa-flask"></i>
                            رابط اللوجو (المعمل) - اختياري
                        </label>
                        <input type="url" class="form-input" id="labLogoUrl" 
                               placeholder="رابط لوجو المعمل (لو موجود)">
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fas fa-hospital"></i>
                            اسم المركز
                        </label>
                        <input type="text" class="form-input" id="centerName" 
                               value="مركز يثرب الخيري التخصصي"
                               placeholder="اسم المركز بالعربية" required>
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fab fa-facebook"></i>
                            رابط فيسبوك
                        </label>
                        <input type="url" class="form-input" id="facebookUrl" 
                               value="https://www.facebook.com/ythrb.altkhssy"
                               placeholder="رابط صفحة الفيسبوك">
                    </div>

                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-phone"></i>
                            رقم الهاتف
                        </label>
                        <input type="text" class="form-input" id="phoneNumber" 
                               value="١٥٠٠٠"
                               placeholder="رقم الاتصال">
                    </div>

                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-map-marker-alt"></i>
                            العنوان
                        </label>
                        <input type="text" class="form-input" id="address" 
                               value="المدينة المنورة"
                               placeholder="العنوان">
                    </div>
                </div>

                <!-- زر الحفظ -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-cloud-upload-alt"></i>
                    حفظ في Firebase
                    <i class="fas fa-database"></i>
                </button>

                <!-- رسالة الحالة -->
                <div id="statusMessage" class="status-message"></div>
            </form>

            <!-- توقيع المصمم -->
            <div class="designer-signature">
                <div class="signature-name">BASHA</div>
                <div style="color: #4a5568;">• Full Stack Developer • 3D Designer •</div>
            </div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909",
            storageBucket: "yathreb-10909.firebasestorage.app",
            messagingSenderId: "525635197745",
            appId: "1:525635197745:web:99e1cbab31693af790ae10"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3D خلفية (نفس الكود السابق)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // جسيمات 3D
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 20;
            posArray[i+1] = (Math.random() - 0.5) * 20;
            posArray[i+2] = (Math.random() - 0.5) * 20;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: '#0e7c9e',
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 5;

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0005;
            particlesMesh.rotation.x += 0.0003;
            renderer.render(scene, camera);
        }
        animate();

        // حفظ الإعدادات في Firebase
        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('statusMessage');
            
            // تغيير حالة الزر
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;
            
            // جمع البيانات
            const settings = {
                centerName: document.getElementById('centerName').value,
                centerLogoUrl: document.getElementById('centerLogoUrl').value,
                labLogoUrl: document.getElementById('labLogoUrl').value || '',
                completionDate: document.getElementById('completionDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                facebookUrl: document.getElementById('facebookUrl').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                address: document.getElementById('address').value,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // حفظ في Firestore
                await db.collection('settings').doc('general').set(settings, { merge: true });
                
                // رسالة نجاح
                statusDiv.className = 'status-message status-success';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> تم حفظ الإعدادات بنجاح في Firebase';
                
                btn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ ✅';
                
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> حفظ في Firebase <i class="fas fa-database"></i>';
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('خطأ في الحفظ:', error);
                
                // رسالة خطأ
                statusDiv.className = 'status-message status-error';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> خطأ: ' + error.message;
                
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> حفظ في Firebase <i class="fas fa-database"></i>';
                btn.disabled = false;
            }
        });

        // تحميل الإعدادات الموجودة (لو فيه)
        async function loadSettings() {
            try {
                const doc = await db.collection('settings').doc('general').get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('centerName').value = data.centerName || 'مركز يثرب الخيري التخصصي';
                    document.getElementById('centerLogoUrl').value = data.centerLogoUrl || '';
                    document.getElementById('labLogoUrl').value = data.labLogoUrl || '';
                    document.getElementById('completionDate').value = data.completionDate || '2026-01-01';
                    document.getElementById('deliveryTime').value = data.deliveryTime || '12:00';
                    document.getElementById('facebookUrl').value = data.facebookUrl || 'https://www.facebook.com/ythrb.altkhssy';
                    document.getElementById('phoneNumber').value = data.phoneNumber || '١٥٠٠٠';
                    document.getElementById('address').value = data.address || 'المدينة المنورة';
                    
                    console.log('✅ تم تحميل الإعدادات من Firebase');
                }
            } catch (error) {
                console.log('لا توجد إعدادات سابقة أو خطأ في التحميل');
            }
        }

        // تحميل الإعدادات عند فتح الصفحة
        loadSettings();

        // Resize handler للـ 3D
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
