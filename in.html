        .status-working {

        }

            border-color: #ef4444;
        }

        .progress-bar {

            background: #2d3748;
            border-radius: 30px;

        .progress-fill {

<body>
    <div class="container">

            <div class="summary-title">📋 ملخص البيانات التي تم إنشاؤها</div>
            <div class="summary-grid" id="summaryGrid">

            </div>

    <script>
        let db, auth;
        let logEntries = [];
        let currentStep = 0;
        const totalSteps = 15; // زودنا الخطوات

        function addLog(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : ''}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            
            logEntries.push({ message, type });
        }

        function updateStep(stepNumber, message, status) {
            const panel = document.getElementById('statusPanel');
            let stepDiv = document.getElementById(`step${stepNumber}`);
            
            if (!stepDiv) {
                stepDiv = document.createElement('div');
                stepDiv.id = `step${stepNumber}`;
                panel.appendChild(stepDiv);
            }
            
            stepDiv.className = `status-item status-${status}`;
            
            const icon = status === 'success' ? '✅' : status === 'working' ? '⏳' : '❌';
            stepDiv.innerHTML = `<span>${icon}</span> ${message}`;
        }

        function updateProgress(step) {
            const progress = (step / totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showSummary(data) {
            const summaryBox = document.getElementById('summaryBox');
            const summaryGrid = document.getElementById('summaryGrid');
            
            summaryGrid.innerHTML = '';
            
            for (const [key, value] of Object.entries(data)) {
                summaryGrid.innerHTML += `
                    <div class="summary-item">
                        <div class="summary-label">${key}</div>
                        <div class="summary-value">${value}</div>
                    </div>
                `;
            }
            
            summaryBox.style.display = 'block';
        }

            addLog('🪄 بدأ السيت أب السحري الكامل...', 'info');
            
            try {
                // ===== 1. تهيئة Firebase =====
                currentStep = 1;
                updateProgress(currentStep);
                updateStep(1, 'تهيئة Firebase...', 'working');
                addLog('جاري تهيئة Firebase...', 'info');
                
                const config = {
                    apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",

                addLog('✅ Firebase initialized', 'success');

                // ===== 2. فتح القواعد مؤقتاً =====

                updateProgress(currentStep);
                updateStep(2, 'فتح القواعد مؤقتاً...', 'working');
                addLog('جاري فتح القواعد...', 'info');
                
                try {
                    await db.collection('_temp').doc('_open').set({
                        timestamp: new Date().toISOString(),
                        action: 'temporary_open'
                    });
                    addLog('✅ القواعد مفتوحة مؤقتاً', 'success');
                    updateStep(2, '✅ تم فتح القواعد', 'success');

                // ===== 3. إنشاء الإعدادات العامة (كل حاجة هتتحط في شاشة الإعدادات) =====

                await db.collection('settings').doc('general').set(settingsData);
                addLog('✅ الإعدادات العامة الكاملة تم إنشاؤها', 'success');
                updateStep(3, '✅ تم إنشاء الإعدادات', 'success');
