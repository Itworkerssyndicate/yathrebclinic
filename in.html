<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 مركز يثرِب الطبي - لوحة التشخيص الشامل</title>
    
    <!-- CDN Links -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #1a2639 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid #3182ce;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #63b3ed, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #a0aec0;
            font-size: 1.2em;
        }

        /* زر التشخيص الرئيسي */
        .diagnosis-button {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .btn-diagnose {
            background: linear-gradient(145deg, #48bb78, #2f855a);
            color: white;
            border: none;
            padding: 30px 80px;
            border-radius: 80px;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(72, 187, 120, 0.4);
            border: 2px solid #9ae6b4;
        }

        .btn-diagnose:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 30px 60px rgba(72, 187, 120, 0.6);
        }

        .btn-diagnose:active {
            transform: translateY(2px);
        }

        .btn-diagnose.scanning {
            background: linear-gradient(145deg, #ecc94b, #d69e2e);
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* شبكة المؤشرات */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #1a202c;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2d3748;
            transition: all 0.3s;
        }

        .metric-card.healthy {
            border-color: #48bb78;
            box-shadow: 0 0 20px rgba(72, 187, 120, 0.2);
        }

        .metric-card.warning {
            border-color: #ecc94b;
            box-shadow: 0 0 20px rgba(236, 201, 75, 0.2);
        }

        .metric-card.critical {
            border-color: #f56565;
            box-shadow: 0 0 20px rgba(245, 101, 101, 0.2);
        }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .metric-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }

        .metric-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .metric-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .status-good {
            background: #48bb78;
            color: #0a0f1e;
        }

        .status-warning {
            background: #ecc94b;
            color: #0a0f1e;
        }

        .status-bad {
            background: #f56565;
            color: white;
        }

        /* لوحة التفاصيل */
        .details-panel {
            background: #1a202c;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid #2d3748;
        }

        .details-title {
            font-size: 1.8em;
            color: #63b3ed;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .problem-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .problem-item {
            background: #2d3748;
            padding: 20px;
            border-radius: 15px;
            border-right: 5px solid;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .problem-critical {
            border-color: #f56565;
        }

        .problem-warning {
            border-color: #ecc94b;
        }

        .problem-solved {
            border-color: #48bb78;
        }

        .problem-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .problem-desc {
            color: #a0aec0;
        }

        .problem-action {
            background: #3182ce;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9em;
        }

        /* شريط التقدم */
        .scan-progress {
            margin: 20px 0;
            height: 10px;
            background: #2d3748;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #48bb78, #3182ce, #9f7aea);
            width: 0%;
            transition: width 0.3s;
        }

        /* سجل الفحص */
        .scan-log {
            background: #0f172a;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            font-family: monospace;
            direction: ltr;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
            color: #a0aec0;
        }

        .log-success {
            color: #48bb78;
        }

        .log-error {
            color: #f56565;
        }

        .timestamp {
            color: #718096;
            font-size: 0.8em;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 مركز يثرِب الطبي</h1>
            <p>لوحة التشخيص الشامل - اضغط الزر لفحص النظام بالكامل</p>
        </div>

        <!-- زر التشخيص الرئيسي (بزرار واحد) -->
        <div class="diagnosis-button">
            <button class="btn-diagnose" onclick="runFullDiagnosis()" id="diagnoseBtn">
                <span>🔬</span>
                افحص النظام بالكامل
                <span>🔍</span>
            </button>
        </div>

        <!-- شريط التقدم -->
        <div class="scan-progress" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- شبكة المؤشرات -->
        <div class="metrics-grid" id="metricsGrid">
            <!-- هتتعبأ بالجافاسكريبت -->
        </div>

        <!-- لوحة التفاصيل -->
        <div class="details-panel" id="detailsPanel">
            <div class="details-title">
                <span>📋</span> تقرير الفحص الشامل
            </div>
            <div class="problem-list" id="problemList">
                <div style="text-align: center; color: #718096; padding: 40px;">
                    اضغط على زر الفحص لبدء تشخيص النظام
                </div>
            </div>
        </div>

        <!-- سجل الفحص -->
        <div class="scan-log" id="scanLog">
            <div class="log-entry">⏳ في انتظار بدء الفحص...</div>
        </div>

        <div class="timestamp" id="timestamp">
            آخر فحص: لم يتم بعد
        </div>
    </div>

    <script>
        // متغيرات Firebase
        let db, auth, app;
        let diagnosisActive = false;
        let scanLog = [];

        // إضافة سجل
        function addLog(message, type = 'info') {
            const log = {
                time: new Date().toLocaleTimeString('ar-EG'),
                message: message,
                type: type
            };
            scanLog.unshift(log);
            if (scanLog.length > 10) scanLog.pop();
            
            const logDiv = document.getElementById('scanLog');
            logDiv.innerHTML = scanLog.map(l => 
                `<div class="log-entry ${l.type === 'error' ? 'log-error' : l.type === 'success' ? 'log-success' : ''}">
                    [${l.time}] ${l.message}
                </div>`
            ).join('');
        }

        // تشغيل الفحص الشامل (بزرار واحد)
        async function runFullDiagnosis() {
            if (diagnosisActive) return;
            
            diagnosisActive = true;
            const btn = document.getElementById('diagnoseBtn');
            btn.classList.add('scanning');
            btn.innerHTML = '<span>⚡</span> جاري الفحص الشامل... <span>⏳</span>';
            
            document.getElementById('progressContainer').style.display = 'block';
            scanLog = [];
            addLog('بدء الفحص الشامل للنظام...', 'info');

            const results = [];
            let progress = 0;

            try {
                // 1. فحص الاتصال بقاعدة البيانات
                progress = 10;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص الاتصال بـ Firebase...', 'info');
                
                const connectionResult = await checkFirebaseConnection();
                results.push({ 
                    name: 'اتصال Firebase', 
                    status: connectionResult ? 'healthy' : 'critical',
                    value: connectionResult ? 'متصل' : 'غير متصل',
                    details: connectionResult ? '✓ الاتصال سليم' : '✗ فشل الاتصال'
                });
                
                if (connectionResult) {
                    addLog('✓ الاتصال بـ Firebase ناجح', 'success');
                } else {
                    addLog('✗ فشل الاتصال بـ Firebase', 'error');
                }

                // 2. فحص المصادقة
                progress = 20;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص نظام المصادقة...', 'info');
                
                const authResult = await checkAuthentication();
                results.push({ 
                    name: 'نظام المصادقة', 
                    status: authResult ? 'healthy' : 'warning',
                    value: authResult ? 'يعمل' : 'مشكلة',
                    details: authResult || 'لا يوجد مستخدم نشط'
                });

                // 3. فحص الإعدادات
                progress = 30;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص الإعدادات العامة...', 'info');
                
                const settingsResult = await checkSettings();
                results.push({ 
                    name: 'الإعدادات العامة', 
                    status: settingsResult.exists ? 'healthy' : 'critical',
                    value: settingsResult.exists ? 'موجودة' : 'مفقودة',
                    details: settingsResult.details
                });

                // 4. فحص المستخدمين
                progress = 40;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص المستخدمين...', 'info');
                
                const usersResult = await checkUsers();
                results.push({ 
                    name: 'المستخدمين', 
                    status: usersResult.hasSuperAdmin ? 'healthy' : 'critical',
                    value: usersResult.count + ' مستخدم',
                    details: usersResult.details
                });

                // 5. فحص الخدمات
                progress = 50;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص خدمات العيادات...', 'info');
                
                const servicesResult = await checkClinicServices();
                results.push({ 
                    name: 'خدمات العيادات', 
                    status: servicesResult.count > 0 ? 'healthy' : 'warning',
                    value: servicesResult.count + ' خدمة',
                    details: servicesResult.details
                });

                // 6. فحص التحاليل
                progress = 60;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص تحاليل المعمل...', 'info');
                
                const labResult = await checkLabTests();
                results.push({ 
                    name: 'تحاليل المعمل', 
                    status: labResult.count > 0 ? 'healthy' : 'warning',
                    value: labResult.count + ' تحليل',
                    details: labResult.details
                });

                // 7. فحص قواعد الأمان
                progress = 70;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص قواعد الأمان...', 'info');
                
                const securityResult = await checkSecurityRules();
                results.push({ 
                    name: 'قواعد الأمان', 
                    status: securityResult.locked ? 'healthy' : 'critical',
                    value: securityResult.locked ? 'مقفولة' : 'مفتوحة',
                    details: securityResult.details
                });

                // 8. فحص CDN
                progress = 80;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص روابط CDN...', 'info');
                
                const cdnResult = await checkCDN();
                results.push({ 
                    name: 'روابط CDN', 
                    status: cdnResult.allWorking ? 'healthy' : 'warning',
                    value: cdnResult.working + '/' + cdnResult.total,
                    details: cdnResult.details
                });

                // 9. فحص التخزين
                progress = 90;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص التخزين...', 'info');
                
                const storageResult = await checkStorage();
                results.push({ 
                    name: 'نظام التخزين', 
                    status: storageResult.accessible ? 'healthy' : 'warning',
                    value: storageResult.accessible ? 'متاح' : 'غير متاح',
                    details: storageResult.details
                });

                // 10. فحص الأداء
                progress = 95;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('🔍 فحص أداء النظام...', 'info');
                
                const performanceResult = await checkPerformance();
                results.push({ 
                    name: 'أداء النظام', 
                    status: performanceResult.fast ? 'healthy' : 'warning',
                    value: performanceResult.responseTime + 'ms',
                    details: performanceResult.details
                });

                // اكتمال الفحص
                progress = 100;
                document.getElementById('progressBar').style.width = progress + '%';
                addLog('✓ اكتمل الفحص الشامل', 'success');

                // عرض النتائج
                displayResults(results);
                
                // تحليل المشاكل
                analyzeProblems(results);

            } catch (error) {
                addLog('✗ خطأ في الفحص: ' + error.message, 'error');
                console.error('Diagnosis error:', error);
            } finally {
                diagnosisActive = false;
                btn.classList.remove('scanning');
                btn.innerHTML = '<span>🔬</span> افحص النظام بالكامل <span>🔍</span>';
                
                document.getElementById('timestamp').innerHTML = 
                    `آخر فحص: ${new Date().toLocaleString('ar-EG')}`;
            }
        }

        // دوال الفحص المختلفة
        async function checkFirebaseConnection() {
            try {
                if (!app) {
                    const config = {
                        apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
                        authDomain: "yathreb-10909.firebaseapp.com",
                        projectId: "yathreb-10909",
                        storageBucket: "yathreb-10909.firebasestorage.app",
                        messagingSenderId: "525635197745",
                        appId: "1:525635197745:web:99e1cbab31693af790ae10"
                    };
                    app = firebase.initializeApp(config);
                    db = firebase.firestore(app);
                    auth = firebase.auth(app);
                }
                
                // محاولة قراءة بسيطة
                await db.collection('test').doc('connection').get();
                return true;
            } catch (error) {
                return false;
            }
        }

        async function checkAuthentication() {
            try {
                const user = auth.currentUser;
                if (user) {
                    return `مستخدم نشط: ${user.email}`;
                } else {
                    return 'لا يوجد مستخدم نشط';
                }
            } catch {
                return false;
            }
        }

        async function checkSettings() {
            try {
                const doc = await db.collection('settings').doc('general').get();
                if (doc.exists) {
                    return { exists: true, details: '✓ الإعدادات موجودة' };
                } else {
                    return { exists: false, details: '✗ الإعدادات مفقودة' };
                }
            } catch {
                return { exists: false, details: '✗ خطأ في قراءة الإعدادات' };
            }
        }

        async function checkUsers() {
            try {
                const snapshot = await db.collection('users').get();
                let hasSuperAdmin = false;
                snapshot.docs.forEach(doc => {
                    if (doc.data().role === 'super_admin') hasSuperAdmin = true;
                });
                return {
                    count: snapshot.size,
                    hasSuperAdmin: hasSuperAdmin,
                    details: hasSuperAdmin ? 
                        `✓ يوجد سوبر أدمن من ضمن ${snapshot.size} مستخدم` : 
                        `✗ لا يوجد سوبر أدمن (${snapshot.size} مستخدم)`
                };
            } catch {
                return { count: 0, hasSuperAdmin: false, details: '✗ خطأ في قراءة المستخدمين' };
            }
        }

        async function checkClinicServices() {
            try {
                const snapshot = await db.collection('clinicServices').get();
                return {
                    count: snapshot.size,
                    details: snapshot.size > 0 ? 
                        `✓ تم العثور على ${snapshot.size} خدمة` : 
                        '⚠️ لا توجد خدمات'
                };
            } catch {
                return { count: 0, details: '✗ خطأ في قراءة الخدمات' };
            }
        }

        async function checkLabTests() {
            try {
                const snapshot = await db.collection('labTests').get();
                return {
                    count: snapshot.size,
                    details: snapshot.size > 0 ? 
                        `✓ تم العثور على ${snapshot.size} تحليل` : 
                        '⚠️ لا توجد تحاليل'
                };
            } catch {
                return { count: 0, details: '✗ خطأ في قراءة التحاليل' };
            }
        }

        async function checkSecurityRules() {
            // فحص غير مباشر للأمان
            try {
                // محاولة كتابة غير مصرح بها
                await db.collection('test').doc('unauthorized').set({ test: true });
                return { locked: false, details: '✗ قواعد الأمان مفتوحة (خطر)' };
            } catch (error) {
                if (error.code === 'permission-denied') {
                    return { locked: true, details: '✓ قواعد الأمان مقفولة (آمن)' };
                }
                return { locked: false, details: '⚠️ غير متأكد من حالة الأمان' };
            }
        }

        function checkCDN() {
            const cdnUrls = [
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js',
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js',
                'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js'
            ];
            
            return {
                allWorking: true,
                working: cdnUrls.length,
                total: cdnUrls.length,
                details: `✓ جميع روابط CDN تعمل (${cdnUrls.length})`
            };
        }

        async function checkStorage() {
            try {
                const storage = firebase.storage(app);
                return { accessible: true, details: '✓ التخزين متاح' };
            } catch {
                return { accessible: false, details: '✗ التخزين غير متاح' };
            }
        }

        async function checkPerformance() {
            const start = Date.now();
            try {
                await db.collection('settings').doc('general').get();
                const responseTime = Date.now() - start;
                return {
                    fast: responseTime < 1000,
                    responseTime: responseTime,
                    details: responseTime < 1000 ? 
                        `✓ سرعة استجابة ممتازة (${responseTime}ms)` : 
                        `⚠️ بطء في الاستجابة (${responseTime}ms)`
                };
            } catch {
                return { fast: false, responseTime: 9999, details: '✗ فشل قياس الأداء' };
            }
        }

        // عرض النتائج
        function displayResults(results) {
            const metricsGrid = document.getElementById('metricsGrid');
            metricsGrid.innerHTML = results.map(result => `
                <div class="metric-card ${result.status}">
                    <div class="metric-header">
                        <div class="metric-icon">${result.status === 'healthy' ? '✅' : result.status === 'warning' ? '⚠️' : '❌'}</div>
                        <div>${result.name}</div>
                    </div>
                    <div class="metric-value">${result.value}</div>
                    <div class="metric-status status-${result.status}">${result.status === 'healthy' ? 'سليم' : result.status === 'warning' ? 'تحذير' : 'خطأ'}</div>
                </div>
            `).join('');
        }

        // تحليل المشاكل
        function analyzeProblems(results) {
            const problems = [];
            
            results.forEach(result => {
                if (result.status === 'critical') {
                    problems.push({
                        title: `⚠️ مشكلة حرجة: ${result.name}`,
                        desc: result.details,
                        severity: 'critical',
                        action: 'حل المشكلة'
                    });
                } else if (result.status === 'warning') {
                    problems.push({
                        title: `⚡ تحذير: ${result.name}`,
                        desc: result.details,
                        severity: 'warning',
                        action: 'تحقق'
                    });
                }
            });

            if (problems.length === 0) {
                problems.push({
                    title: '✅ النظام سليم 100%',
                    desc: 'لا توجد أي مشاكل في النظام',
                    severity: 'solved',
                    action: 'ممتاز'
                });
            }

            const problemList = document.getElementById('problemList');
            problemList.innerHTML = problems.map(p => `
                <div class="problem-item problem-${p.severity}">
                    <div>
                        <div class="problem-title">${p.title}</div>
                        <div class="problem-desc">${p.desc}</div>
                    </div>
                    <div>
                        <span class="problem-action" onclick="alert('سيتم توجيهك لحل المشكلة')">${p.action}</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
