<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ السيت أب السحري - مركز يثرب الخيري التخصصي</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a1a2f 0%, #1a3a5a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid #0e7c9e;
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #63b3ed, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .magic-button {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .btn-magic {
            background: linear-gradient(145deg, #fbbf24, #d97706);
            color: #0f172a;
            border: none;
            padding: 35px 80px;
            border-radius: 80px;
            font-size: 3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(251, 191, 36, 0.5);
            border: 3px solid #fef3c7;
        }

        .btn-magic:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 30px 70px rgba(251, 191, 36, 0.7);
        }

        .btn-magic:active {
            transform: translateY(2px);
        }

        .status-panel {
            background: #1e293b;
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            border: 2px solid #334155;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #0f172a;
            border-radius: 15px;
            margin-bottom: 10px;
            border-right: 5px solid;
        }

        .status-success {
            border-color: #10b981;
        }

        .status-working {
            border-color: #fbbf24;
        }

        .status-error {
            border-color: #ef4444;
        }

        .progress-bar {
            height: 20px;
            background: #2d3748;
            border-radius: 30px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%;
            transition: width 0.5s;
        }

        .log-box {
            background: #0f172a;
            border-radius: 15px;
            padding: 20px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
            direction: ltr;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
            color: #94a3b8;
        }

        .log-success {
            color: #10b981;
        }

        .log-error {
            color: #ef4444;
        }

        .final-rules {
            background: #312e81;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            direction: ltr;
            font-family: monospace;
            white-space: pre-wrap;
            color: #a5f3fc;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ مركز يثرب الخيري التخصصي</h1>
            <p>السيت أب السحري - اضغط مرة واحدة بس</p>
        </div>

        <!-- الزر السحري -->
        <div class="magic-button">
            <button class="btn-magic" onclick="magicSetup()" id="magicBtn">
                <span>🪄</span>
                اضغط هنا
                <span>✨</span>
            </button>
        </div>

        <!-- حالة التنفيذ -->
        <div class="status-panel" id="statusPanel">
            <div id="step1" class="status-item status-working">
                <span>⏳</span> في انتظار البدء...
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- سجل التنفيذ -->
        <div class="log-box" id="logBox">
            <div class="log-entry">✨ اضغط على الزر السحري لبدء كل شيء</div>
        </div>

        <!-- القواعد النهائية (تظهر بعد ما نخلص) -->
        <div class="final-rules" id="finalRules">
            // هتظهر هنا بعد ما نخلص
        </div>
    </div>

    <script>
        let db, auth;
        let logEntries = [];
        let currentStep = 0;
        const totalSteps = 12;

        function addLog(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : ''}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            
            logEntries.push({ message, type });
        }

        function updateStep(stepNumber, message, status) {
            const panel = document.getElementById('statusPanel');
            const stepDiv = document.getElementById(`step${stepNumber}`) || document.createElement('div');
            
            stepDiv.id = `step${stepNumber}`;
            stepDiv.className = `status-item status-${status}`;
            
            const icon = status === 'success' ? '✅' : status === 'working' ? '⏳' : '❌';
            stepDiv.innerHTML = `<span>${icon}</span> ${message}`;
            
            if (!document.getElementById(`step${stepNumber}`)) {
                panel.appendChild(stepDiv);
            } else {
                document.getElementById(`step${stepNumber}`).outerHTML = stepDiv.outerHTML;
            }
        }

        function updateProgress(step) {
            const progress = (step / totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        async function magicSetup() {
            const btn = document.getElementById('magicBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⚡</span> جاري التنفيذ... <span>⏳</span>';
            
            addLog('🪄 بدأ السيت أب السحري...', 'info');
            
            try {
                // 1. تهيئة Firebase
                currentStep = 1;
                updateProgress(currentStep);
                updateStep(1, 'تهيئة Firebase...', 'working');
                addLog('جاري تهيئة Firebase...', 'info');
                
                const config = {
                    apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
                    authDomain: "yathreb-10909.firebaseapp.com",
                    projectId: "yathreb-10909",
                    storageBucket: "yathreb-10909.firebasestorage.app",
                    messagingSenderId: "525635197745",
                    appId: "1:525635197745:web:99e1cbab31693af790ae10"
                };

                const app = firebase.initializeApp(config);
                db = firebase.firestore(app);
                auth = firebase.auth(app);
                
                updateStep(1, '✅ تم تهيئة Firebase', 'success');
                addLog('✅ Firebase initialized', 'success');

                // 2. فتح القواعد مؤقتاً (عن طريق كتابة تجريبية)
                currentStep = 2;
                updateProgress(currentStep);
                updateStep(2, 'فتح القواعد مؤقتاً...', 'working');
                addLog('جاري فتح القواعد...', 'info');
                
                try {
                    await db.collection('_temp').doc('_open').set({
                        timestamp: new Date().toISOString(),
                        action: 'temporary_open'
                    });
                    addLog('✅ القواعد مفتوحة مؤقتاً', 'success');
                    updateStep(2, '✅ تم فتح القواعد', 'success');
                } catch (e) {
                    addLog('⚠️ القواعد مفتوحة بالفعل', 'success');
                    updateStep(2, '✅ القواعد مفتوحة', 'success');
                }

                // 3. إنشاء الإعدادات العامة
                currentStep = 3;
                updateProgress(currentStep);
                updateStep(3, 'إنشاء الإعدادات العامة...', 'working');
                
                await db.collection('settings').doc('general').set({
                    centerName: 'مركز يثرب الخيري التخصصي',
                    centerLogoUrl: 'https://scontent.faly2-2.fna.fbcdn.net/v/t39.30808-6/476472762_1187938009650859_5208399285481594262_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=Jj3_P2SMrOIQ7kNvwE07p-l&_nc_oc=AdlxfEKMUf4mnTe1QvbSWdKzzFzkHX9DrlfuxIBwrVbOtowui5H3X5kZGIM6f9dB_Gc&_nc_zt=23&_nc_ht=scontent.faly2-2.fna&_nc_gid=MkEyGIJBMhR04y8s7i9okw&_nc_ss=8&oh=00_AfzbUeCF4Nf5C4B9CIFr5C0w66qD471ZiPQ-X3O90N2NEA&oe=69BDEAF7',
                    labName: 'معمل يثرب للتحاليل',
                    labLogoUrl: '',
                    facebook: 'https://www.facebook.com/ythrb.altkhssy',
                    phone: '١٥٠٠٠',
                    address: 'المدينة المنورة',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                addLog('✅ الإعدادات العامة created', 'success');
                updateStep(3, '✅ تم إنشاء الإعدادات', 'success');

                // 4. إنشاء خدمات العيادات
                currentStep = 4;
                updateProgress(currentStep);
                updateStep(4, 'إنشاء خدمات العيادات...', 'working');
                
                const clinicServices = [
                    { name: 'عيادات تخصصية', desc: 'باطنة - مسالك - أطفال', icon: 'user-md', price: 300 },
                    { name: 'تمريض منزلي', desc: 'رعاية تمريضية في المنزل', icon: 'user-nurse', price: 200 },
                    { name: 'سونار', desc: 'تشخيص بالسونار', icon: 'ultrasound', price: 500 }
                ];
                
                for (const service of clinicServices) {
                    await db.collection('clinicServices').add({
                        ...service,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                addLog(`✅ ${clinicServices.length} خدمة تم إنشاؤها`, 'success');
                updateStep(4, '✅ تم إنشاء خدمات العيادات', 'success');

                // 5. إنشاء تحاليل المعمل
                currentStep = 5;
                updateProgress(currentStep);
                updateStep(5, 'إنشاء تحاليل المعمل...', 'working');
                
                const labTests = [
                    { name: 'صورة دم كاملة', price: 150, category: 'basic' },
                    { name: 'وظائف كبد', price: 250, category: 'liver' },
                    { name: 'وظائف كلى', price: 200, category: 'kidney' },
                    { name: 'سكر صائم', price: 80, category: 'diabetes' }
                ];
                
                for (const test of labTests) {
                    await db.collection('labTests').add({
                        ...test,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                addLog(`✅ ${labTests.length} تحليل تم إنشاؤها`, 'success');
                updateStep(5, '✅ تم إنشاء تحاليل المعمل', 'success');

                // 6. إنشاء المستخدم الأول (سوبر أدمن)
                currentStep = 6;
                updateProgress(currentStep);
                updateStep(6, 'إنشاء المستخدم الأول...', 'working');
                
                try {
                    // نستخدم auth مباشرة
                    const userCredential = await auth.createUserWithEmailAndPassword(
                        'admin@yathreb.com',
                        'Yathreb@2024'
                    );
                    
                    await db.collection('users').doc(userCredential.user.uid).set({
                        email: 'admin@yathreb.com',
                        role: 'super_admin',
                        name: 'مدير النظام',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    addLog('✅ Super admin created', 'success');
                    updateStep(6, '✅ تم إنشاء المستخدم', 'success');
                } catch (e) {
                    addLog('⚠️ المستخدم موجود بالفعل', 'success');
                    updateStep(6, '✅ المستخدم موجود', 'success');
                }

                // 7. إنشاء العروض
                currentStep = 7;
                updateProgress(currentStep);
                updateStep(7, 'إنشاء العروض...', 'working');
                
                await db.collection('offers').add({
                    name: 'عرض الافتتاح',
                    discount: 30,
                    description: 'خصم 30% على جميع الخدمات',
                    startDate: new Date().toISOString(),
                    endDate: new Date(Date.now() + 30*24*60*60*1000).toISOString()
                });
                addLog('✅ Offers created', 'success');
                updateStep(7, '✅ تم إنشاء العروض', 'success');

                // 8. إنشاء الحضانات
                currentStep = 8;
                updateProgress(currentStep);
                updateStep(8, 'إنشاء الحضانات...', 'working');
                
                await db.collection('nurseries').add({
                    name: 'حضانة يثرب',
                    capacity: 20,
                    price: 1500,
                    services: ['رعاية نهارية', 'متابعة تمريضية'],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                addLog('✅ Nurseries created', 'success');
                updateStep(8, '✅ تم إنشاء الحضانات', 'success');

                // 9. الفحص الشامل
                currentStep = 9;
                updateProgress(currentStep);
                updateStep(9, 'جاري فحص النظام...', 'working');
                
                const checks = [
                    'settings', 'clinicServices', 'labTests', 
                    'offers', 'nurseries', 'users'
                ];
                
                let successCount = 0;
                for (const check of checks) {
                    try {
                        const snapshot = await db.collection(check).get();
                        addLog(`✅ ${check}: ${snapshot.size} مستند`, 'success');
                        successCount++;
                    } catch (e) {
                        addLog(`⚠️ ${check}: ${e.message}`, 'error');
                    }
                }
                
                if (successCount === checks.length) {
                    updateStep(9, '✅ الفحص ناجح - كل شيء يعمل', 'success');
                } else {
                    updateStep(9, `⚠️ الفحص: ${successCount}/${checks.length} يعمل`, 'warning');
                }

                // 10. إغلاق القواعد (حذف المجموعة المؤقتة)
                currentStep = 10;
                updateProgress(currentStep);
                updateStep(10, 'إغلاق القواعد...', 'working');
                
                try {
                    await db.collection('_temp').doc('_open').delete();
                    addLog('✅ Temporary rules closed', 'success');
                    updateStep(10, '✅ تم إغلاق القواعد', 'success');
                } catch (e) {
                    addLog('⚠️ No temp collection to delete', 'success');
                    updateStep(10, '✅ القواعد جاهزة', 'success');
                }

                // 11. عرض القواعد النهائية
                currentStep = 11;
                updateProgress(currentStep);
                updateStep(11, 'تجهيز القواعد النهائية...', 'working');
                
                const finalRules = `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    // السماح بالقراءة للجميع (لظهور الموقع)
    match /settings/{document} {
      allow read: if true;
      allow write: if request.auth != null;
    }
    
    match /clinicServices/{service} {
      allow read: if true;
      allow write: if request.auth != null;
    }
    
    match /labTests/{test} {
      allow read: if true;
      allow write: if request.auth != null;
    }
    
    match /offers/{offer} {
      allow read: if true;
      allow write: if request.auth != null;
    }
    
    match /nurseries/{nursery} {
      allow read: if true;
      allow write: if request.auth != null;
    }
    
    // المستخدمين - للمصادق عليهم فقط
    match /users/{userId} {
      allow read: if request.auth != null;
      allow write: if request.auth != null;
    }
    
    // الباقي مرفوض
    match /{document=**} {
      allow read, write: if false;
    }
  }
}`;

                document.getElementById('finalRules').style.display = 'block';
                document.getElementById('finalRules').textContent = finalRules;
                
                updateStep(11, '✅ القواعد النهائية جاهزة', 'success');
                addLog('✅ Final rules displayed', 'success');

                // 12. اكتمال المهمة
                currentStep = 12;
                updateProgress(currentStep);
                updateStep(12, '✨ اكتمل السيت أب السحري!', 'success');
                
                addLog('🎉 تم كل شيء بنجاح!', 'success');
                addLog('🔒 القواعد النهائية في الأسفل - انسخها والصقها في Firebase Console', 'info');
                
                btn.innerHTML = '<span>✅</span> تم بنجاح <span>✨</span>';
                
            } catch (error) {
                addLog(`❌ خطأ: ${error.message}`, 'error');
                updateStep(currentStep, `❌ فشل: ${error.message}`, 'error');
                btn.innerHTML = '<span>❌</span> حدث خطأ <span>⚠️</span>';
            }
        }
    </script>
</body>
</html>
