<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATHREB SETUP | إعدادات يثرب</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Three.js للـ 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* Reset متطور */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: #0a0f1e;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        /* خلفية متحركة 3D */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* طبقات الجسيمات */
        .particle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, #0a0f1e 80%);
            z-index: 1;
            pointer-events: none;
        }

        /* المحتوى الرئيسي */
        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .setup-card {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 20, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 50px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5),
                        0 0 0 2px rgba(14, 165, 233, 0.2),
                        0 0 50px rgba(14, 165, 233, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            perspective: 1000px;
            animation: cardFloat 6s infinite ease-in-out;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(14,165,233,0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
            z-index: -1;
        }

        .logo-3d {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
            transform-style: preserve-3d;
            animation: logoSpin 10s infinite linear;
        }

        @keyframes logoSpin {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.2);
            transform: translateZ(20px);
        }

        .header h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(14,165,233,0.5);
        }

        .header h2 {
            font-size: 1.8em;
            color: #0e7c9e;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(14,124,158,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            transform: translateZ(30px);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(14,124,158,0.4); }
            50% { box-shadow: 0 20px 50px rgba(14,124,158,0.8); }
        }

        /* الفورم */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .form-item {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
        }

        .form-item:hover {
            transform: translateZ(20px) translateY(-5px);
        }

        .form-item.full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 1.1em;
        }

        .form-label i {
            color: #0e7c9e;
            margin-left: 8px;
        }

        .form-input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #0e7c9e;
            box-shadow: 0 0 30px rgba(14,124,158,0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .form-input::placeholder {
            color: #4a5568;
        }

        /* زر الإرسال */
        .submit-btn {
            width: 100%;
            padding: 25px;
            background: linear-gradient(145deg, #0e7c9e, #0a5d7a);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.8em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
            margin-top: 30px;
            transform-style: preserve-3d;
            transform: translateZ(0);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover {
            transform: translateZ(30px) translateY(-5px);
            box-shadow: 0 30px 50px rgba(14,124,158,0.5);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn i {
            font-size: 2em;
            animation: btnIcon 2s infinite;
        }

        @keyframes btnIcon {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        /* 3D Stats */
        .stats-3d {
            display: flex;
            justify-content: space-around;
            margin: 40px 0;
            transform-style: preserve-3d;
        }

        .stat-item {
            text-align: center;
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            transform: translateZ(40px);
            transition: transform 0.3s;
            flex: 1;
            margin: 0 10px;
        }

        .stat-item:hover {
            transform: translateZ(60px) translateY(-10px);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 900;
            color: #0e7c9e;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 1em;
        }

        /* توقيع المصمم */
        .designer-signature {
            text-align: center;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .signature-text {
            font-size: 1.3em;
            color: #94a3b8;
        }

        .signature-name {
            font-size: 2.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #0e7c9e, #0a5d7a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .signature-role {
            color: #4a5568;
            font-size: 1.1em;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .float-item {
            position: absolute;
            font-size: 1.5em;
            color: rgba(14,124,158,0.2);
            animation: floatElement 6s infinite;
        }

        @keyframes floatElement {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(20px, -20px) rotate(10deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-item.full-width {
                grid-column: span 1;
            }
            .setup-card {
                padding: 30px;
            }
            .header h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    <div class="particle-overlay"></div>

    <!-- المحتوى الرئيسي -->
    <div class="content">
        <div class="setup-card">
            <div class="header">
                <div class="logo-3d">
                    <div class="logo-circle">
                        <i class="fas fa-caduceus"></i>
                    </div>
                </div>
                <h1>YATHREB SETUP</h1>
                <h2>إعدادات مركز يثرب الخيري التخصصي</h2>
                <div class="badge">
                    <i class="fas fa-crown"></i> النظام الشامل لإدارة المركز
                </div>
            </div>

            <!-- الفورم الرئيسية -->
            <form id="setupForm">
                <div class="form-grid">
                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-calendar"></i>
                            تاريخ الانتهاء
                        </label>
                        <input type="date" class="form-input" id="completionDate" value="2026-01-01" required>
                    </div>

                    <div class="form-item">
                        <label class="form-label">
                            <i class="fas fa-clock"></i>
                            وقت التسليم
                        </label>
                        <input type="time" class="form-input" id="deliveryTime" value="12:00" required>
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fas fa-link"></i>
                            رابط اللوجو
                        </label>
                        <input type="url" class="form-input" id="logoUrl" 
                               value="https://scontent.faly2-2.fna.fbcdn.net/v/t39.30808-6/476472762_1187938009650859_5208399285481594262_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=Jj3_P2SMrOIQ7kNvwE07p-l&_nc_oc=AdlxfEKMUf4mnTe1QvbSWdKzzFzkHX9DrlfuxIBwrVbOtowui5H3X5kZGIM6f9dB_Gc&_nc_zt=23&_nc_ht=scontent.faly2-2.fna&_nc_gid=MkEyGIJBMhR04y8s7i9okw&_nc_ss=8&oh=00_AfzbUeCF4Nf5C4B9CIFr5C0w66qD471ZiPQ-X3O90N2NEA&oe=69BDEAF7"
                               placeholder="https://example.com/logo.jpg" required>
                    </div>

                    <div class="form-item full-width">
                        <label class="form-label">
                            <i class="fas fa-hospital"></i>
                            اسم المركز
                        </label>
                        <input type="text" class="form-input" id="centerName" 
                               value="مركز يثرب الخيري التخصصي"
                               placeholder="اسم المركز بالعربية" required>
                    </div>
                </div>

                <!-- إحصائيات 3D -->
                <div class="stats-3d">
                    <div class="stat-item">
                        <div class="stat-number" id="daysLeft">365</div>
                        <div class="stat-label">يوم حتى الافتتاح</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="servicesCount">12</div>
                        <div class="stat-label">خدمة طبية</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="doctorsCount">8</div>
                        <div class="stat-label">طبيب استشاري</div>
                    </div>
                </div>

                <!-- زر الحفظ -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-cog"></i>
                    حفظ الإعدادات وبدء التهيئة
                    <i class="fas fa-arrow-left"></i>
                </button>
            </form>

            <!-- توقيع المصمم -->
            <div class="designer-signature">
                <div class="signature-text">تصميم وتطوير</div>
                <div class="signature-name">BASHA</div>
                <div class="signature-role">• UI/UX Designer • 3D Developer •</div>
                
                <!-- عناصر عائمة -->
                <div class="floating-elements">
                    <div class="float-item" style="top: 20%; left: 10%;"><i class="fas fa-code"></i></div>
                    <div class="float-item" style="top: 70%; right: 15%;"><i class="fas fa-cube"></i></div>
                    <div class="float-item" style="bottom: 30%; left: 20%;"><i class="fas fa-magic"></i></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3D خلفية متحركة باستخدام Three.js
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // إضاءة
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // كرات طبية عائمة (جسيمات)
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 20;
            posArray[i+1] = (Math.random() - 0.5) * 20;
            posArray[i+2] = (Math.random() - 0.5) * 20;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: '#0e7c9e',
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        camera.position.z = 5;

        // حركة الجسيمات
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (event.clientY / window.innerHeight - 0.5) * 2;
        });

        // تحديث العدادات
        function updateStats() {
            const completionDate = document.getElementById('completionDate').value;
            const daysLeft = Math.ceil((new Date(completionDate) - new Date()) / (1000 * 60 * 60 * 24));
            document.getElementById('daysLeft').textContent = daysLeft > 0 ? daysLeft : 0;
        }

        document.getElementById('completionDate').addEventListener('change', updateStats);
        updateStats();

        // حفظ الإعدادات
        document.getElementById('setupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const settings = {
                completionDate: document.getElementById('completionDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                logoUrl: document.getElementById('logoUrl').value,
                centerName: document.getElementById('centerName').value
            };
            
            // حفظ في localStorage للاستخدام في الصفحات الأخرى
            localStorage.setItem('yathrebSettings', JSON.stringify(settings));
            
            // تأثير نجاح
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ بنجاح <i class="fas fa-check"></i>';
            btn.style.background = 'linear-gradient(145deg, #10b981, #059669)';
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-cog"></i> حفظ الإعدادات وبدء التهيئة <i class="fas fa-arrow-left"></i>';
                btn.style.background = 'linear-gradient(145deg, #0e7c9e, #0a5d7a)';
            }, 2000);
            
            console.log('تم حفظ الإعدادات:', settings);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            particlesMesh.rotation.y += 0.0005;
            particlesMesh.rotation.x += 0.0003;
            
            // تفاعل مع حركة الماوس
            particlesMesh.rotation.y += mouseX * 0.0005;
            particlesMesh.rotation.x += mouseY * 0.0005;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
