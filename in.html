<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ السيت أب السحري - صفحة قريباً</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0a1a2f 0%, #1a3a5a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(26, 32, 44, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid #0e7c9e;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #63b3ed, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .magic-button {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .btn-magic {
            background: linear-gradient(145deg, #fbbf24, #d97706);
            color: #0f172a;
            border: none;
            padding: 30px 60px;
            border-radius: 60px;
            font-size: 2.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(251, 191, 36, 0.5);
            border: 3px solid #fef3c7;
        }

        .btn-magic:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 30px 70px rgba(251, 191, 36, 0.7);
        }

        .status-panel {
            background: #1e293b;
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            border: 2px solid #334155;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #0f172a;
            border-radius: 15px;
            margin-bottom: 10px;
            border-right: 5px solid;
        }

        .status-success {
            border-color: #10b981;
        }

        .status-working {
            border-color: #fbbf24;
        }

        .progress-bar {
            height: 20px;
            background: #2d3748;
            border-radius: 30px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            width: 0%;
            transition: width 0.5s;
        }

        .log-box {
            background: #0f172a;
            border-radius: 15px;
            padding: 20px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            direction: ltr;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
            color: #94a3b8;
        }

        .log-success {
            color: #10b981;
        }

        .summary-box {
            background: #0a2a3a;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 2px solid #0e7c9e;
        }

        .summary-title {
            color: #0e7c9e;
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .summary-item {
            background: #1e293b;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-right: 3px solid #fbbf24;
        }

        .summary-label {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .summary-value {
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 5px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ السيت أب السحري</h1>
            <p>لصفحة "قريباً" - مركز يثرب الخيري التخصصي</p>
        </div>

        <!-- الزر السحري -->
        <div class="magic-button">
            <button class="btn-magic" onclick="magicSetup()" id="magicBtn">
                <span>🪄</span>
                اضغط هنا
                <span>✨</span>
            </button>
        </div>

        <!-- حالة التنفيذ -->
        <div class="status-panel" id="statusPanel">
            <div id="step1" class="status-item status-working">
                <span>⏳</span> في انتظار البدء...
            </div>
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- سجل التنفيذ -->
        <div class="log-box" id="logBox">
            <div class="log-entry">✨ اضغط على الزر السحري لبدء تهيئة البيانات</div>
        </div>

        <!-- ملخص البيانات -->
        <div class="summary-box" id="summaryBox" style="display: none;">
            <div class="summary-title">📋 البيانات التي تم حفظها</div>
            <div id="summaryContent"></div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDMXfjOsas18yb0b8mbbhGqJj78yFFTVyU",
            authDomain: "yathreb-10909.firebaseapp.com",
            projectId: "yathreb-10909",
            storageBucket: "yathreb-10909.firebasestorage.app",
            messagingSenderId: "525635197745",
            appId: "1:525635197745:web:99e1cbab31693af790ae10"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentStep = 0;
        const totalSteps = 5;

        function addLog(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'success' ? 'log-success' : ''}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateStep(stepNumber, message, status) {
            const panel = document.getElementById('statusPanel');
            let stepDiv = document.getElementById(`step${stepNumber}`);
            
            if (!stepDiv) {
                stepDiv = document.createElement('div');
                stepDiv.id = `step${stepNumber}`;
                panel.appendChild(stepDiv);
            }
            
            stepDiv.className = `status-item status-${status}`;
            const icon = status === 'success' ? '✅' : status === 'working' ? '⏳' : '❌';
            stepDiv.innerHTML = `<span>${icon}</span> ${message}`;
        }

        function updateProgress(step) {
            const progress = (step / totalSteps) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showSummary(data) {
            const summaryBox = document.getElementById('summaryBox');
            const summaryContent = document.getElementById('summaryContent');
            
            let html = '';
            for (const [key, value] of Object.entries(data)) {
                html += `
                    <div class="summary-item">
                        <div class="summary-label">${key}</div>
                        <div class="summary-value">${value}</div>
                    </div>
                `;
            }
            
            summaryContent.innerHTML = html;
            summaryBox.style.display = 'block';
        }

        async function magicSetup() {
            const btn = document.getElementById('magicBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>⚡</span> جاري التنفيذ... <span>⏳</span>';
            
            addLog('🪄 بدأ تهيئة بيانات صفحة قريباً...', 'info');
            
            try {
                // ===== 1. تهيئة Firebase =====
                currentStep = 1;
                updateProgress(currentStep);
                updateStep(1, 'تهيئة Firebase...', 'working');
                addLog('جاري تهيئة Firebase...', 'info');
                
                // اختبار الاتصال
                await db.collection('test').doc('connection').set({
                    timestamp: new Date().toISOString()
                });
                
                updateStep(1, '✅ تم تهيئة Firebase', 'success');
                addLog('✅ Firebase initialized', 'success');

                // ===== 2. فتح القواعد مؤقتاً =====
                currentStep = 2;
                updateProgress(currentStep);
                updateStep(2, 'فتح القواعد مؤقتاً...', 'working');
                addLog('جاري فتح القواعد...', 'info');
                
                try {
                    await db.collection('_temp').doc('_open').set({
                        timestamp: new Date().toISOString(),
                        action: 'temporary_open'
                    });
                    addLog('✅ القواعد مفتوحة مؤقتاً', 'success');
                    updateStep(2, '✅ تم فتح القواعد', 'success');
                } catch (e) {
                    addLog('⚠️ القواعد مفتوحة بالفعل', 'success');
                    updateStep(2, '✅ القواعد جاهزة', 'success');
                }

                // ===== 3. إنشاء الإعدادات الأساسية =====
                currentStep = 3;
                updateProgress(currentStep);
                updateStep(3, 'حفظ الإعدادات الأساسية...', 'working');
                
                // البيانات الأساسية للصفحة
                const settings = {
                    // اسم المركز
                    centerName: 'مركز يثرب الخيري التخصصي',
                    
                    // رابط اللوجو
                    logoUrl: 'https://scontent.faly2-2.fna.fbcdn.net/v/t39.30808-6/476472762_1187938009650859_5208399285481594262_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=Jj3_P2SMrOIQ7kNvwE07p-l&_nc_oc=AdlxfEKMUf4mnTe1QvbSWdKzzFzkHX9DrlfuxIBwrVbOtowui5H3X5kZGIM6f9dB_Gc&_nc_zt=23&_nc_ht=scontent.faly2-2.fna&_nc_gid=MkEyGIJBMhR04y8s7i9okw&_nc_ss=8&oh=00_AfzbUeCF4Nf5C4B9CIFr5C0w66qD471ZiPQ-X3O90N2NEA&oe=69BDEAF7',
                    
                    // رقم التليفون
                    phone: '١٥٠٠٠',
                    
                    // العنوان
                    address: 'المدينة المنورة - المملكة العربية السعودية',
                    
                    // تاريخ الانتهاء (للكاونتر)
                    completionDate: '2026-01-01',
                    
                    // وقت التسليم
                    deliveryTime: '12:00',
                    
                    // الكومنت تحت الكاونتر
                    comment: 'استعدوا معنا لأكبر افتتاح طبي في المدينة المنورة',
                    
                    // فيسبوك
                    facebook: 'https://www.facebook.com/ythrb.altkhssy',
                    
                    // خدمات سريعة
                    services: [
                        {
                            icon: 'user-md',
                            name: 'عيادات تخصصية',
                            comment: 'باطنة - مسالك - أطفال'
                        },
                        {
                            icon: 'flask',
                            name: 'معمل متطور',
                            comment: 'تحاليل دقيقة وسريعة'
                        },
                        {
                            icon: 'baby',
                            name: 'حضانات أطفال',
                            comment: 'رعاية متكاملة'
                        },
                        {
                            icon: 'user-nurse',
                            name: 'تمريض منزلي',
                            comment: 'رعاية تمريضية في المنزل'
                        },
                        {
                            icon: 'heartbeat',
                            name: 'أشعة وتشخيص',
                            comment: 'سونار - رسم قلب'
                        },
                        {
                            icon: 'hand-holding-heart',
                            name: 'خدمات خيرية',
                            comment: 'بأسعار مخفضة'
                        }
                    ],
                    
                    آخرتحديث: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('settings').doc('comingSoon').set(settings, { merge: true });
                
                addLog('✅ تم حفظ الإعدادات الأساسية', 'success');
                updateStep(3, '✅ تم حفظ الإعدادات', 'success');

                // ===== 4. فحص البيانات =====
                currentStep = 4;
                updateProgress(currentStep);
                updateStep(4, 'فحص البيانات...', 'working');
                
                const doc = await db.collection('settings').doc('comingSoon').get();
                if (doc.exists) {
                    addLog('✅ البيانات موجودة ومتاحة', 'success');
                    updateStep(4, '✅ فحص ناجح', 'success');
                    
                    // عرض الملخص
                    showSummary({
                        'اسم المركز': settings.centerName,
                        'رقم التليفون': settings.phone,
                        'العنوان': settings.address,
                        'تاريخ الانتهاء': settings.completionDate,
                        'وقت التسليم': settings.deliveryTime,
                        'عدد الخدمات': `${settings.services.length} خدمة`
                    });
                }

                // ===== 5. إغلاق القواعد =====
                currentStep = 5;
                updateProgress(currentStep);
                updateStep(5, 'إغلاق القواعد...', 'working');
                
                try {
                    await db.collection('_temp').doc('_open').delete();
                    addLog('✅ تم إغلاق القواعد', 'success');
                    updateStep(5, '✅ القواعد مقفولة', 'success');
                } catch (e) {
                    addLog('✅ القواعد جاهزة', 'success');
                    updateStep(5, '✅ تم', 'success');
                }

                // اكتمال المهمة
                addLog('🎉 تم تهيئة كل البيانات بنجاح!', 'success');
                addLog('📱 البيانات جاهزة لصفحة "قريباً"', 'success');
                
                btn.innerHTML = '<span>✅</span> تم بنجاح <span>✨</span>';
                
            } catch (error) {
                addLog(`❌ خطأ: ${error.message}`, 'error');
                updateStep(currentStep, `❌ فشل: ${error.message}`, 'error');
                btn.innerHTML = '<span>❌</span> حدث خطأ <span>⚠️</span>';
            }
        }
    </script>
</body>
</html>
